name: Build All Platforms

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CROC_TAG: v10.4.4
  CROC_REPO: https://github.com/schollz/croc.git
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ═══════════════════════════════════════════════════════════
  #  Test
  # ═══════════════════════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter test

  # ═══════════════════════════════════════════════════════════
  #  Android ARM64-v8a APK  (croc built from source via Go)
  # ═══════════════════════════════════════════════════════════
  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone croc source
        run: |
          git clone --depth 1 --branch $CROC_TAG $CROC_REPO /tmp/croc_src

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build croc bridge (.so) for Android ARM64
        run: |
          cd go_bridge
          go mod edit -replace github.com/schollz/croc/v10=/tmp/croc_src
          go mod tidy
          export ANDROID_NDK_HOME=$ANDROID_NDK
          export TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export CC=$TOOLCHAIN/bin/aarch64-linux-android21-clang
          export CGO_ENABLED=1
          export GOOS=android
          export GOARCH=arm64
          mkdir -p ../android/app/src/main/jniLibs/arm64-v8a
          go build -buildmode=c-shared \
            -o ../android/app/src/main/jniLibs/arm64-v8a/libcroc_bridge.so \
            -ldflags="-s -w" .

      - name: Verify .so
        run: ls -lh android/app/src/main/jniLibs/arm64-v8a/libcroc_bridge.so

      - run: flutter pub get
      - run: flutter build apk --release --target-platform android-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-android-arm64-v8a
          path: build/app/outputs/flutter-apk/app-release.apk

  # ═══════════════════════════════════════════════════════════
  #  Windows AMD64  (croc.exe built from source via Go)
  # ═══════════════════════════════════════════════════════════
  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone croc source
        run: |
          git clone --depth 1 --branch $env:CROC_TAG $env:CROC_REPO $env:TEMP\croc_src

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build croc.exe from source
        shell: pwsh
        run: |
          $src = "$env:TEMP\croc_src"
          Set-Location $src
          $env:CGO_ENABLED = "0"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -ldflags="-s -w" -o "$env:GITHUB_WORKSPACE\windows\runner\croc.exe" .
          Write-Host "croc.exe built"

      - name: Verify croc.exe
        run: ls -lh windows/runner/croc.exe

      - run: flutter pub get
      - run: flutter config --enable-windows-desktop
      - run: flutter build windows --release

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath FlCroc-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-windows-amd64
          path: FlCroc-windows-amd64.zip

  # ═══════════════════════════════════════════════════════════
  #  Linux AMD64  (croc built from source via Go → .deb)
  # ═══════════════════════════════════════════════════════════
  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone croc source
        run: |
          git clone --depth 1 --branch $CROC_TAG $CROC_REPO /tmp/croc_src

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev dpkg-dev

      - name: Build croc from source
        run: |
          cd /tmp/croc_src
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o /tmp/croc .
          mkdir -p linux/flutter/ephemeral
          cp /tmp/croc linux/flutter/ephemeral/croc
          chmod +x linux/flutter/ephemeral/croc

      - name: Verify croc
        run: ls -lh linux/flutter/ephemeral/croc && file linux/flutter/ephemeral/croc

      - run: flutter pub get
      - run: flutter config --enable-linux-desktop
      - run: flutter build linux --release

      - name: Create .deb package
        run: |
          APPNAME=flcroc
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d+ -f1)
          PKG_DIR=build/linux_deb/${APPNAME}_${VERSION}_amd64
          mkdir -p ${PKG_DIR}/DEBIAN
          mkdir -p ${PKG_DIR}/opt/${APPNAME}
          mkdir -p ${PKG_DIR}/usr/share/applications
          mkdir -p ${PKG_DIR}/usr/share/icons/hicolor/256x256/apps
          cp -r build/linux/x64/release/bundle/* ${PKG_DIR}/opt/${APPNAME}/

          printf 'Package: flcroc\nVersion: %s\nSection: utils\nPriority: optional\nArchitecture: amd64\nMaintainer: FlCroc Team\nDescription: FlCroc - GUI client for croc file transfer\n A cross-platform Flutter GUI for croc, enabling easy and secure\n file transfers between computers with Material 3 design.\n' "$VERSION" > ${PKG_DIR}/DEBIAN/control

          cat > ${PKG_DIR}/usr/share/applications/flcroc.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=FlCroc
          Comment=Secure file transfer GUI
          Exec=/opt/flcroc/fl_croc
          Icon=flcroc
          Terminal=false
          Type=Application
          Categories=Utility;Network;
          DESKTOP

          mkdir -p ${PKG_DIR}/usr/local/bin
          ln -s /opt/${APPNAME}/fl_croc ${PKG_DIR}/usr/local/bin/flcroc
          dpkg-deb --build ${PKG_DIR}

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-linux-amd64-deb
          path: build/linux_deb/flcroc_*_amd64.deb

  # ═══════════════════════════════════════════════════════════
  #  Release (on tag push)
  # ═══════════════════════════════════════════════════════════
  release:
    needs: [build-android, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - run: ls -R artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/FlCroc-android-arm64-v8a/app-release.apk
            artifacts/FlCroc-windows-amd64/FlCroc-windows-amd64.zip
            artifacts/FlCroc-linux-amd64-deb/*.deb
          draft: false
          generate_release_notes: true
