name: Build

on:
  push:
    branches: [main, master, dev]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25'

jobs:
  # ── Prebuild: submodule update + platform detection + branch detection ──
  prebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      windows: ${{ steps.platform.outputs.windows }}
      windows_arm64: ${{ steps.platform.outputs.windows_arm64 }}
      linux: ${{ steps.platform.outputs.linux }}
      android: ${{ steps.platform.outputs.android }}
      is_main: ${{ steps.branch.outputs.is_main }}
      is_tag: ${{ steps.branch.outputs.is_tag }}
      do_release: ${{ steps.ver.outputs.do_release }}
      release_version: ${{ steps.ver.outputs.release_version }}
      release_tag: ${{ steps.ver.outputs.release_tag }}
      release_name: ${{ steps.ver.outputs.release_name }}
      nightly_version: ${{ steps.ver.outputs.nightly_version }}
      nightly_date: ${{ steps.ver.outputs.nightly_date }}
      synced_version: ${{ steps.ver.outputs.synced_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Determine branch
        id: branch
        run: |
          REF="${{ github.ref }}"
          if [[ "$REF" == refs/tags/* ]]; then
            echo "is_main=true" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          elif [[ "$REF" == refs/heads/main ]] || [[ "$REF" == refs/heads/master ]]; then
            echo "is_main=true" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
          else
            echo "is_main=false" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync version & detect release
        id: ver
        if: steps.branch.outputs.is_tag == 'false'
        env:
          MSG: ${{ github.event.head_commit.message || '' }}
        run: |
          SHA=$(git rev-parse --short HEAD)
          CUR_VER=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d+ -f1)
          echo "do_release=false" >> $GITHUB_OUTPUT

          if echo "$MSG" | grep -qE '^(r|release|beta)-[0-9]+\.[0-9]+\.[0-9]+'; then
            # ── Release / Beta ──
            PREFIX=$(echo "$MSG" | grep -oE '^(r|release|beta)' | head -1)
            VER=$(echo "$MSG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            CUR_BUILD=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}' | grep -oE '\+[0-9]+$' | tr -d '+')
            CUR_BUILD=${CUR_BUILD:-0}
            NEW_BUILD=$((CUR_BUILD + 1))
            NEW_VERSION_BASE="$VER"
            NEW_VERSION="${NEW_VERSION_BASE}+${NEW_BUILD}"
            case "$PREFIX" in
              beta)
                TAG="v$VER-beta"
                REL_NAME="FlCroc Beta $VER"
                ;;
              *)
                TAG="v$VER"
                REL_NAME="FlCroc $VER"
                ;;
            esac
            echo "Syncing release version: $NEW_VERSION (build $CUR_BUILD → $NEW_BUILD)"
            echo "do_release=true" >> $GITHUB_OUTPUT
            echo "release_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "release_tag=$TAG" >> $GITHUB_OUTPUT
            echo "release_name=$REL_NAME" >> $GITHUB_OUTPUT
            echo "synced_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add pubspec.yaml
            git diff --cached --quiet && exit 0
            git commit -m "sync-ver: $NEW_VERSION [skip ci]"
            git push
          else
            # ── Non-release: increment build number only if a build will run ──
            if ! echo "$MSG" | grep -qE '\b(b-win64|b-win|b-linux|b-mobile|b-all)\b'; then
              echo "No build trigger in commit message, skip version sync"
              echo "nightly_version=${CUR_VER}" >> $GITHUB_OUTPUT
              echo "nightly_date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT
              echo "synced_version=${CUR_VER}" >> $GITHUB_OUTPUT
              exit 0
            fi

            BASE=$(echo "$CUR_VER" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
            if [ -z "$BASE" ]; then BASE="$CUR_VER"; fi
            CUR_BUILD=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}' | grep -oE '\+[0-9]+$' | tr -d '+')
            CUR_BUILD=${CUR_BUILD:-0}
            NEW_BUILD=$((CUR_BUILD + 1))
            NEW_VERSION="${BASE}+${NEW_BUILD}"
            NIGHTLY_DATE=$(date +%Y%m%d)
            echo "Syncing dev version: $NEW_VERSION (build $CUR_BUILD → $NEW_BUILD)"
            echo "nightly_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "nightly_date=$NIGHTLY_DATE" >> $GITHUB_OUTPUT
            echo "synced_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add pubspec.yaml
            git diff --cached --quiet && exit 0
            git commit -m "sync-ver: $NEW_VERSION [skip ci]"
            git push
          fi

      - name: Update submodule to latest croc
        run: |
          cd submodules/croc
          for i in 1 2 3; do
            echo "Attempt $i..."
            git fetch --tags --depth 1 && break
            sleep $((i * 5))
          done || echo "⚠️ Fetch failed — using existing submodule ref"
          latest=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -n "$latest" ]; then
            git checkout "$latest" 2>/dev/null || echo "⚠️ Checkout failed — using existing ref"
          fi
          cd ../..
          find submodules/croc -name '*_test.go' -delete

      - name: Determine platforms
        id: platform
        env:
          MSG: ${{ github.event.head_commit.message || '' }}
          IS_TAG: ${{ steps.branch.outputs.is_tag }}
        run: |
          W='false'; WA='false'; L='false'; A='false'
          if [ "$IS_TAG" = "true" ]; then
            W='true'; WA='true'; L='true'; A='true'
          else
            case "$MSG" in
              *b-win64*)  W='true' ;;           # amd64 only, no arm64
              *b-win*)    W='true'; WA='true' ;; # both amd64 + arm64
              *b-linux*)  L='true' ;;
              *b-mobile*) A='true' ;;
              *b-all*)    W='true'; WA='true'; L='true'; A='true' ;;
            esac
          fi
          echo "windows=$W" >> $GITHUB_OUTPUT
          echo "windows_arm64=$WA" >> $GITHUB_OUTPUT
          echo "linux=$L" >> $GITHUB_OUTPUT
          echo "android=$A" >> $GITHUB_OUTPUT
          echo "Platforms → windows:$W arm64:$WA linux:$L android:$A"

  # ── Test ──
  test:
    needs: prebuild
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Run tests
        run: flutter test

  # ── Windows (AMD64 + optional ARM64 via Zig cross-compile) ──
  build-windows:
    needs: [test, prebuild]
    if: needs.prebuild.outputs.windows == 'true' || needs.prebuild.outputs.windows_arm64 == 'true'
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Pull latest (include version sync from prebuild)
        if: needs.prebuild.outputs.is_tag != 'true'
        run: git pull origin ${{ github.ref_name }}

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $env:GITHUB_OUTPUT

      - name: Get version
        id: ver
        env:
          IS_TAG: ${{ needs.prebuild.outputs.is_tag }}
          SYNCED_VER: ${{ needs.prebuild.outputs.synced_version }}
        run: |
          if ($env:IS_TAG -eq 'true') {
            $v = (Get-Content pubspec.yaml | Where-Object { $_ -match '^version:' } | Select-Object -First 1) -replace '^version:\s+(\S+).*', '$1'
          } else {
            $v = $env:SYNCED_VER
          }
          echo "version=$v" >> $env:GITHUB_OUTPUT
          echo "display_version=$($v -replace '\+.*$','')" >> $env:GITHUB_OUTPUT

      # ── Shared: Go + Flutter setup ──

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      # ════════════════════════════════════════════════════════════
      # ── AMD64: native Go build + Flutter Windows ──
      # ════════════════════════════════════════════════════════════

      - name: "[AMD64] Build Go bridge (.dll)"
        if: needs.prebuild.outputs.windows == 'true'
        run: |
          Push-Location go_bridge
          go mod tidy
          $env:CGO_ENABLED = "1"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CC = "gcc"
          go build -buildmode=c-shared -ldflags="-s -w -H windowsgui" -o "$env:GITHUB_WORKSPACE\windows\runner\libcroc_bridge.dll" .
          Pop-Location

      - name: "[AMD64] Verify .dll"
        if: needs.prebuild.outputs.windows == 'true'
        run: |
          if (Test-Path windows\runner\libcroc_bridge.dll) {
            Get-Item windows\runner\libcroc_bridge.dll | Select-Object Length, FullName
          } else {
            Write-Error "libcroc_bridge.dll not found!"
          }

      - name: "[AMD64] Build Flutter Windows"
        if: needs.prebuild.outputs.windows == 'true'
        run: flutter build windows --release

      - name: "[AMD64] Bundle bridge .dll into build output"
        if: needs.prebuild.outputs.windows == 'true'
        run: Copy-Item "windows\runner\libcroc_bridge.dll" "build\windows\x64\runner\Release\libcroc_bridge.dll" -Force

      - name: "[AMD64] Package zip"
        if: needs.prebuild.outputs.windows == 'true'
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath FlCroc-${{ steps.ver.outputs.display_version }}-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        if: needs.prebuild.outputs.windows == 'true'
        with:
          name: FlCroc-${{ steps.ver.outputs.display_version }}-windows-amd64
          path: FlCroc-${{ steps.ver.outputs.display_version }}-windows-amd64.zip

      # ── AMD64: portable single-file EXE via 7z SFX ──
      - name: "[AMD64] Create portable single EXE"
        if: needs.prebuild.outputs.windows == 'true'
        run: |
          $staging = 'sfx-staging'
          $name = 'FlCroc-${{ steps.ver.outputs.display_version }}-windows-amd64'
          if (Test-Path $staging) { Remove-Item -Recurse -Force $staging }
          Expand-Archive "$name.zip" -DestinationPath $staging
          # 7z SFX config: extract to fixed portable dir, then run
          # InstallPath ensures extract-once portable behaviour (not temp)
          $cfg = @'
          ;!@Install@!UTF-8!
          InstallPath=""%LOCALAPPDATA%\FlCroc""
          RunProgram=""FlCroc.exe""
          ;!@InstallEnd@!
          '@
          $cfg | Out-File -Encoding ASCII "$staging\config.txt" -NoNewline
          $cfg | Set-Content -Path "$staging\config.txt" -NoNewline
          # Build SFX archive
          Push-Location $staging
          & 7z a -mx9 ..\sfx.7z * -x!config.txt
          Pop-Location
          # Combine: SFX stub + config + archive
          $stub = 'C:\Program Files\7-Zip\7z.sfx'
          if (Test-Path $stub) {
            cmd /c copy /b "$stub" + "$staging\config.txt" + sfx.7z "$name.exe"
          } else {
            & 7z a -sfx -mx9 "$name.exe" ".\$staging\*"
          }
          Remove-Item sfx.7z -ErrorAction SilentlyContinue

      - uses: actions/upload-artifact@v4
        if: needs.prebuild.outputs.windows == 'true'
        with:
          name: FlCroc-${{ steps.ver.outputs.display_version }}-windows-amd64-exe
          path: FlCroc-${{ steps.ver.outputs.display_version }}-windows-amd64.exe

      # ════════════════════════════════════════════════════════════
      # ── ARM64: Zig cross-compile Go bridge → repack AMD64 artifact ──
      # ════════════════════════════════════════════════════════════

      - name: "[ARM64] Setup Zig (cross-compiler)"
        if: needs.prebuild.outputs.windows_arm64 == 'true'
        run: |
          if (!(Get-Command zig -ErrorAction SilentlyContinue)) {
            choco install zig --no-progress -y
          }
          zig version

      - name: "[ARM64] Build Go bridge (.dll)"
        if: needs.prebuild.outputs.windows_arm64 == 'true'
        run: |
          Push-Location go_bridge
          go mod tidy
          $env:CGO_ENABLED = "1"
          $env:GOOS = "windows"
          $env:GOARCH = "arm64"
          $env:CC = "zig cc -target aarch64-windows-gnu"
          $env:CXX = "zig c++ -target aarch64-windows-gnu"
          go build -buildmode=c-shared -ldflags="-s -w -H windowsgui" -o "$env:GITHUB_WORKSPACE\windows\runner\libcroc_bridge_arm64.dll" .
          Pop-Location

      - name: "[ARM64] Verify .dll"
        if: needs.prebuild.outputs.windows_arm64 == 'true'
        run: |
          if (Test-Path windows\runner\libcroc_bridge_arm64.dll) {
            Get-Item windows\runner\libcroc_bridge_arm64.dll | Select-Object Length, FullName
          } else {
            Write-Error "libcroc_bridge_arm64.dll not found!"
          }

      - name: "[ARM64] Download AMD64 artifact"
        if: needs.prebuild.outputs.windows_arm64 == 'true'
        uses: actions/download-artifact@v4
        with:
          name: FlCroc-${{ steps.ver.outputs.display_version }}-windows-amd64
          path: amd64-pkg

      - name: "[ARM64] Repack with ARM64 .dll"
        if: needs.prebuild.outputs.windows_arm64 == 'true'
        run: |
          Expand-Archive "amd64-pkg\FlCroc-${{ steps.ver.outputs.display_version }}-windows-amd64.zip" -DestinationPath arm64-repack
          Copy-Item "windows\runner\libcroc_bridge_arm64.dll" "arm64-repack\libcroc_bridge.dll" -Force
          Copy-Item "windows\runner\libcroc_bridge_arm64.dll" "arm64-repack\data\flutter_assets\libcroc_bridge.dll" -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path "arm64-repack\*" -DestinationPath FlCroc-${{ steps.ver.outputs.display_version }}-windows-arm64.zip

      - uses: actions/upload-artifact@v4
        if: needs.prebuild.outputs.windows_arm64 == 'true'
        with:
          name: FlCroc-${{ steps.ver.outputs.display_version }}-windows-arm64
          path: FlCroc-${{ steps.ver.outputs.display_version }}-windows-arm64.zip

  # ── Linux ──
  build-linux:
    needs: [test, prebuild]
    if: needs.prebuild.outputs.linux == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Pull latest (include version sync from prebuild)
        if: needs.prebuild.outputs.is_tag != 'true'
        run: git pull origin ${{ github.ref_name }}

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get version
        id: ver
        env:
          IS_TAG: ${{ needs.prebuild.outputs.is_tag }}
          SYNCED_VER: ${{ needs.prebuild.outputs.synced_version }}
        run: |
          if [ "$IS_TAG" = "true" ]; then
            V=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d+ -f1)
            echo "version=$V" >> $GITHUB_OUTPUT
            echo "display_version=$V" >> $GITHUB_OUTPUT
          else
            echo "version=$SYNCED_VER" >> $GITHUB_OUTPUT
            echo "display_version=$(echo $SYNCED_VER | cut -d+ -f1)" >> $GITHUB_OUTPUT
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Linux deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Build Go bridge (.so)
        run: |
          cd go_bridge
          go mod tidy
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -buildmode=c-shared -ldflags="-s -w" -o ../linux/flutter/ephemeral/libcroc_bridge.so .
          cd ..

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build Linux
        run: flutter build linux --release

      - name: Bundle bridge .so into build output
        run: |
          mkdir -p build/linux/x64/release/bundle/lib
          cp linux/flutter/ephemeral/libcroc_bridge.so build/linux/x64/release/bundle/lib/

      - name: Package tar
        run: tar -czf FlCroc-${{ steps.ver.outputs.display_version }}-linux-amd64.tar.gz -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-${{ steps.ver.outputs.display_version }}-linux-amd64
          path: FlCroc-${{ steps.ver.outputs.display_version }}-linux-amd64.tar.gz

  # ── Android ──
  build-android:
    needs: [test, prebuild]
    if: needs.prebuild.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Pull latest (include version sync from prebuild)
        if: needs.prebuild.outputs.is_tag != 'true'
        run: git pull origin ${{ github.ref_name }}

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get version
        id: ver
        env:
          IS_TAG: ${{ needs.prebuild.outputs.is_tag }}
          SYNCED_VER: ${{ needs.prebuild.outputs.synced_version }}
        run: |
          if [ "$IS_TAG" = "true" ]; then
            V=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d+ -f1)
            echo "version=$V" >> $GITHUB_OUTPUT
            echo "display_version=$V" >> $GITHUB_OUTPUT
          else
            echo "version=$SYNCED_VER" >> $GITHUB_OUTPUT
            echo "display_version=$(echo $SYNCED_VER | cut -d+ -f1)" >> $GITHUB_OUTPUT
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Build Go bridge for Android (.so)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/x86_64
          cd go_bridge
          go mod tidy
          export HOST_TAG=linux-x86_64

          # ARM64
          export CC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/${HOST_TAG}/bin/aarch64-linux-android21-clang"
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 \
            go build -buildmode=c-shared -ldflags="-s -w" \
            -o ../android/app/src/main/jniLibs/arm64-v8a/libcroc_bridge.so .
          echo "✓ Go bridge built for Android ARM64"
          file ../android/app/src/main/jniLibs/arm64-v8a/libcroc_bridge.so

          # x86_64
          export CC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/${HOST_TAG}/bin/x86_64-linux-android21-clang"
          CGO_ENABLED=1 GOOS=android GOARCH=amd64 \
            go build -buildmode=c-shared -ldflags="-s -w" \
            -o ../android/app/src/main/jniLibs/x86_64/libcroc_bridge.so .
          echo "✓ Go bridge built for Android x86_64"
          file ../android/app/src/main/jniLibs/x86_64/libcroc_bridge.so
          cd ..

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Patch Android plugin registrant (catch Error too)
        run: |
          FILE=android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java
          sed -i 's/catch (Exception e)/catch (Throwable e)/g' "$FILE"
          rm -rf android/app/src/main/kotlin/com

      - name: Build Android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release --target-platform android-arm64,android-x64

      - name: Rename artifact
        run: mv build/app/outputs/flutter-apk/app-release.apk FlCroc-${{ steps.ver.outputs.display_version }}-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-${{ steps.ver.outputs.display_version }}-android
          path: FlCroc-${{ steps.ver.outputs.display_version }}-android.apk

  # ── Nightly release (dev branch) ──
  nightly:
    needs: [prebuild, build-windows, build-linux, build-android]
    if: |
      always() && !failure() && !cancelled() &&
      needs.prebuild.outputs.do_release == 'false' &&
      (needs.build-windows.result != 'skipped' ||
       needs.build-linux.result != 'skipped' ||
       needs.build-android.result != 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get nightly version
        id: ver
        env:
          NIGHTLY_VER: ${{ needs.prebuild.outputs.nightly_version }}
          NIGHTLY_DATE: ${{ needs.prebuild.outputs.nightly_date }}
        run: |
          echo "version=$NIGHTLY_VER" >> $GITHUB_OUTPUT
          echo "title=Nightly $NIGHTLY_VER $NIGHTLY_DATE" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f -ls

      - name: Build release body
        id: body
        env:
          MSG: ${{ github.event.head_commit.message || '' }}
          TITLE: ${{ steps.ver.outputs.title }}
        run: |
          BODY="## $TITLE

          **Commit**: \`${{ steps.sha.outputs.sha }}\`

          > $MSG

          > ⚠️ This is an automated dev-branch build. May be unstable.

          ### Downloads"
          for f in artifacts/FlCroc-*; do
            fname=$(basename "$f")
            case "$fname" in
              *windows*) icon="🪟 Windows" ;;
              *linux*)   icon="🐧 Linux" ;;
              *android*) icon="🤖 Android" ;;
              *)         icon="📦" ;;
            esac
            BODY="$BODY"$'\n'"- $icon | \`$fname\`"
          done
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Delete existing nightly release
        run: |
          if gh release view "nightly" &>/dev/null; then
            echo "Deleting existing nightly release"
            gh release delete "nightly" --yes --cleanup-tag
          else
            echo "No existing nightly release"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: ${{ steps.ver.outputs.title }}
          body: ${{ steps.body.outputs.body }}
          files: |
            artifacts/FlCroc-*
          draft: false
          prerelease: true
          make_latest: false

  # ── Production release (manual tag push or auto from release/beta commit) ──
  release:
    needs: [prebuild, build-android, build-windows, build-linux]
    if: |
      always() && !cancelled() &&
      needs.prebuild.result != 'failure' &&
      needs.build-android.result != 'failure' &&
      needs.build-linux.result != 'failure' &&
      (startsWith(github.ref, 'refs/tags/v') ||
       needs.prebuild.outputs.do_release == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Resolve version info
        id: version
        run: |
          # Prefer prebuild outputs (from release/beta commit)
          if [ "${{ needs.prebuild.outputs.do_release }}" = "true" ]; then
            VER="${{ needs.prebuild.outputs.release_version }}"
            DISPLAY_VER=$(echo "$VER" | cut -d+ -f1)
            echo "version=$DISPLAY_VER" >> $GITHUB_OUTPUT
            echo "tag=${{ needs.prebuild.outputs.release_tag }}" >> $GITHUB_OUTPUT
            echo "release_name=${{ needs.prebuild.outputs.release_name }}" >> $GITHUB_OUTPUT
          else
            # Manual tag push: parse from commit or pubspec
            COMMIT_MSG=$(git log -1 --pretty=%B)
            if echo "$COMMIT_MSG" | grep -qE '^r-[0-9]+\.[0-9]+\.[0-9]+'; then
              VERSION=$(echo "$COMMIT_MSG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
              echo "version=$VERSION" >> $GITHUB_OUTPUT
              echo "tag=v$VERSION" >> $GITHUB_OUTPUT
              echo "release_name=FlCroc $VERSION" >> $GITHUB_OUTPUT
            elif echo "$COMMIT_MSG" | grep -qE '^beta-[0-9]+\.[0-9]+\.[0-9]+'; then
              VERSION=$(echo "$COMMIT_MSG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
              echo "version=$VERSION" >> $GITHUB_OUTPUT
              echo "tag=v$VERSION-beta" >> $GITHUB_OUTPUT
              echo "release_name=FlCroc Beta $VERSION" >> $GITHUB_OUTPUT
            else
              VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d+ -f1)
              echo "version=$VERSION" >> $GITHUB_OUTPUT
              echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
              echo "release_name=FlCroc $VERSION" >> $GITHUB_OUTPUT
            fi
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f -ls

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_name }}
          body: |
            ## 📦 ${{ steps.version.outputs.release_name }}

            Cross-platform file transfer GUI powered by croc.

            ### Downloads
            | Platform | File |
            |----------|------|
            | 🪟 Windows x64 | `FlCroc-${{ steps.version.outputs.version }}-windows-amd64.zip` |
            | 🪟 Windows ARM64 | `FlCroc-${{ steps.version.outputs.version }}-windows-arm64.zip` |
            | 💿 Windows Installer | `FlCroc-${{ steps.version.outputs.version }}-windows-amd64-installer.exe` |
            | 🐧 Linux | `FlCroc-${{ steps.version.outputs.version }}-linux-amd64.tar.gz` |
            | 🤖 Android | `FlCroc-${{ steps.version.outputs.version }}-android-arm64.apk` |

            ### What's Changed
            (auto-generated release notes below)
          files: |
            artifacts/FlCroc-*-android-arm64.apk
            artifacts/FlCroc-*-windows-amd64.zip
            artifacts/FlCroc-*-windows-arm64.zip
            artifacts/FlCroc-*-windows-amd64-installer.exe
            artifacts/FlCroc-*-linux-amd64.tar.gz
          draft: false
          generate_release_notes: true
          make_latest: true
