name: Build

on:
  push:
    branches: [main, master, dev]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25'

jobs:
  # ── Prebuild: submodule update + platform detection + branch detection ──
  prebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      windows: ${{ steps.platform.outputs.windows }}
      windows_arm64: ${{ steps.platform.outputs.windows_arm64 }}
      linux: ${{ steps.platform.outputs.linux }}
      android: ${{ steps.platform.outputs.android }}
      arch_all: ${{ steps.platform.outputs.arch_all }}
      is_main: ${{ steps.branch.outputs.is_main }}
      is_tag: ${{ steps.branch.outputs.is_tag }}
      do_release: ${{ steps.ver.outputs.do_release }}
      release_version: ${{ steps.ver.outputs.release_version }}
      release_tag: ${{ steps.ver.outputs.release_tag }}
      release_name: ${{ steps.ver.outputs.release_name }}
      nightly_version: ${{ steps.ver.outputs.nightly_version }}
      nightly_date: ${{ steps.ver.outputs.nightly_date }}
      synced_version: ${{ steps.ver.outputs.synced_version }}
      i18n: ${{ steps.ver.outputs.i18n }}
      readme: ${{ steps.ver.outputs.readme }}
      app_version: ${{ steps.app-ver.outputs.version }}
      flutter_version: ${{ steps.flutter-ver.outputs.version }}
      croc_version: ${{ steps.croc-ver.outputs.version }}
      skip_all: ${{ steps.platform.outputs.skip_all }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Determine branch
        id: branch
        run: |
          REF="${{ github.ref }}"
          if [[ "$REF" == refs/tags/* ]]; then
            echo "is_main=true" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          elif [[ "$REF" == refs/heads/main ]] || [[ "$REF" == refs/heads/master ]]; then
            echo "is_main=true" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
          else
            echo "is_main=false" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync version & detect release
        id: ver
        if: steps.branch.outputs.is_tag == 'false'
        env:
          MSG: ${{ github.event.head_commit.message || '' }}
        run: |
          SHA=$(git rev-parse --short HEAD)
          CUR_VER=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d+ -f1)
          echo "do_release=false" >> $GITHUB_OUTPUT
          echo "i18n=false" >> $GITHUB_OUTPUT
          echo "readme=false" >> $GITHUB_OUTPUT

          # Trigger detection
          if echo "$MSG" | grep -qiE 'i18n|i10n'; then
            echo "i18n=true" >> $GITHUB_OUTPUT
          fi
          if echo "$MSG" | grep -qiE '\breadme\b'; then
            echo "readme=true" >> $GITHUB_OUTPUT
          fi

          if echo "$MSG" | grep -qE '^(r|release|beta)-[0-9]+\.[0-9]+\.[0-9]+'; then
            # ── Release / Beta ──
            PREFIX=$(echo "$MSG" | grep -oE '^(r|release|beta)' | head -1)
            VER=$(echo "$MSG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            CUR_BUILD=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}' | grep -oE '\+[0-9]+$' | tr -d '+')
            CUR_BUILD=${CUR_BUILD:-0}
            NEW_BUILD=$((CUR_BUILD + 1))
            NEW_VERSION_BASE="$VER"
            NEW_VERSION="${NEW_VERSION_BASE}+${NEW_BUILD}"
            case "$PREFIX" in
              beta)
                TAG="v$VER-beta"
                REL_NAME="Beta $VER"
                ;;
              *)
                TAG="v$VER"
                REL_NAME="$VER"
                ;;
            esac
            echo "Syncing release version: $NEW_VERSION (build $CUR_BUILD → $NEW_BUILD)"
            echo "do_release=true" >> $GITHUB_OUTPUT
            echo "release_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "release_tag=$TAG" >> $GITHUB_OUTPUT
            echo "release_name=$REL_NAME" >> $GITHUB_OUTPUT
            echo "synced_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add pubspec.yaml
            git diff --cached --quiet && exit 0
            git commit -m "sync-ver: $NEW_VERSION [skip ci]"
            git push
          else
            # ── Non-release: increment build number only if a build will run ──
            if ! echo "$MSG" | grep -qE '\b(b-win|b-linux|b-mobile|b-all)\b'; then
              echo "No build trigger in commit message, skip version sync"
              echo "nightly_version=${CUR_VER}" >> $GITHUB_OUTPUT
              echo "nightly_date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT
              echo "synced_version=${CUR_VER}" >> $GITHUB_OUTPUT
              exit 0
            fi

            BASE=$(echo "$CUR_VER" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
            if [ -z "$BASE" ]; then BASE="$CUR_VER"; fi
            CUR_BUILD=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}' | grep -oE '\+[0-9]+$' | tr -d '+')
            CUR_BUILD=${CUR_BUILD:-0}
            NEW_BUILD=$((CUR_BUILD + 1))
            NEW_VERSION="${BASE}+${NEW_BUILD}"
            NIGHTLY_DATE=$(date +%Y%m%d)
            echo "Syncing dev version: $NEW_VERSION (build $CUR_BUILD → $NEW_BUILD)"
            echo "nightly_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "nightly_date=$NIGHTLY_DATE" >> $GITHUB_OUTPUT
            echo "synced_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add pubspec.yaml
            git diff --cached --quiet && exit 0
            git commit -m "sync-ver: $NEW_VERSION [skip ci]"
            git push
          fi

      - name: Update submodule to latest croc
        run: |
          cd submodules/croc
          for i in 1 2 3; do
            echo "Attempt $i..."
            git fetch --tags --depth 1 && break
            sleep $((i * 5))
          done || echo "⚠️ Fetch failed — using existing submodule ref"
          latest=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -n "$latest" ]; then
            git checkout "$latest" 2>/dev/null || echo "⚠️ Checkout failed — using existing ref"
          fi
          cd ../..
          find submodules/croc -name '*_test.go' -delete

      - name: Detect croc version
        id: croc-ver
        run: |
          cd submodules/croc
          VER=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')
          echo "version=${VER:-unknown}" >> $GITHUB_OUTPUT
          cd ../..

      - name: Detect Flutter version
        id: flutter-ver
        run: |
          VER=$(curl -sL https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json | jq -r '.releases[] | select(.channel=="stable") | .version' | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "version=${VER:-unknown}" >> $GITHUB_OUTPUT

      - name: Detect app version
        id: app-ver
        run: |
          VER=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d+ -f1)
          echo "version=${VER}" >> $GITHUB_OUTPUT

      - name: Determine platforms
        id: platform
        env:
          MSG: ${{ github.event.head_commit.message || '' }}
          IS_TAG: ${{ steps.branch.outputs.is_tag }}
        run: |
          W='false'; WA='false'; L='false'; A='false'; ALL='false'
          # b-none: skip all builds and tests
          if echo "$MSG" | grep -qE '\bb-none\b'; then
            echo "skip_all=true" >> $GITHUB_OUTPUT
            echo "windows=false" >> $GITHUB_OUTPUT
            echo "windows_arm64=false" >> $GITHUB_OUTPUT
            echo "linux=false" >> $GITHUB_OUTPUT
            echo "android=false" >> $GITHUB_OUTPUT
            echo "arch_all=false" >> $GITHUB_OUTPUT
            echo "Platforms → b-none: skip all"
            exit 0
          fi
          echo "skip_all=false" >> $GITHUB_OUTPUT
          # arch-all: include secondary architectures (Win-ARM64, Android-AMD64)
          if echo "$MSG" | grep -qE '\b(arch-all)\b'; then ALL='true'; fi
          if [ "$IS_TAG" = "true" ]; then
            W='true'; WA='true'; L='true'; A='true'; ALL='true'
          else
            case "$MSG" in
              *b-win*)    W='true' ;;
              *b-linux*)  L='true' ;;
              *b-mobile*) A='true' ;;
              *b-all*)    W='true'; L='true'; A='true' ;;
            esac
            # Secondary arch: only when arch-all flag is present
            if [ "$ALL" = 'true' ]; then
              if [ "$W" = 'true' ]; then WA='true'; fi
            fi
          fi
          echo "windows=$W" >> $GITHUB_OUTPUT
          echo "windows_arm64=$WA" >> $GITHUB_OUTPUT
          echo "linux=$L" >> $GITHUB_OUTPUT
          echo "android=$A" >> $GITHUB_OUTPUT
          echo "arch_all=$ALL" >> $GITHUB_OUTPUT
          echo "Platforms → windows:$W arm64:$WA linux:$L android:$A arch-all:$ALL"

  # ── Test ──
  test:
    needs: prebuild
    if: always() && !failure() && !cancelled() && !needs.prebuild.outputs.skip_all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Run tests
        run: flutter test

  # ── i18n Status ──
  i18n:
    needs: prebuild
    if: needs.prebuild.outputs.i18n == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate i18n status
        run: |
          TEMPLATE="assets/templates/i18n.md"
          OUTPUT="docs/i18n.md"
          DEFAULT="assets/bundles/en.json"
          NOW=$(date -u +'%Y-%m-%d %H:%M UTC')

          # Count translatable keys (exclude _comment_* and header keys)
          HEADER_KEYS=4  # lang, langCode, langRegion, langRegionCode
          DEFAULT_TOTAL=$(jq '[keys[] | select(startswith("_") | not)] | length' "$DEFAULT")
          ACTUAL=$((DEFAULT_TOTAL - HEADER_KEYS))

          ROWS=""
          for f in assets/bundles/*.json; do
            LANG=$(jq -r '.lang' "$f")
            CODE=$(jq -r '.langCode' "$f")
            REGION=$(jq -r '.langRegion' "$f")
            TOTAL=$(jq '[keys[] | select(startswith("_") | not)] | length' "$f")
            KEYS=$((TOTAL - HEADER_KEYS))
            PCT=$((100 * KEYS / ACTUAL))
            [ "$PCT" -gt 100 ] && PCT=100

            if   [ "$PCT" -ge 100 ]; then STATUS="✅"
            elif [ "$PCT" -ge 50  ]; then STATUS="⚠️"
            else STATUS="❌"
            fi

            # Count localized doc files
            DOC_DIR="docs/$CODE"
            DOCS=$(find "$DOC_DIR" -name '*.md' 2>/dev/null | wc -l)
            HAS_DOC_JSON=""
            [ -f "assets/docs/$CODE.json" ] && HAS_DOC_JSON="📄"

            ROWS="$ROWS| $LANG | \`$CODE\` | $REGION | $KEYS/$ACTUAL ($PCT%) | $DOCS $HAS_DOC_JSON | $STATUS |\n"
          done

          cp "$TEMPLATE" "$OUTPUT"
          sed -i "s#{{date}}#$NOW#" "$OUTPUT"
          sed -i "s#{{rows}}#$ROWS#" "$OUTPUT"

      - name: Commit i18n.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/i18n.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update i18n status [skip ci]"
            git push
          fi

  # ── README Generation ──
  readme:
    needs: prebuild
    if: needs.prebuild.outputs.readme == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate README from template
        env:
          APP_VERSION: ${{ needs.prebuild.outputs.app_version }}
          FLUTTER_VERSION: ${{ needs.prebuild.outputs.flutter_version }}
          CROC_VERSION: ${{ needs.prebuild.outputs.croc_version }}
        run: |
          TEMPLATE="assets/templates/README.md"
          DATA="assets/docs/en.json"
          OUTPUT="README.md"

          # Dynamically build language links: current lang (en) plain, others linked
          LANG="en"
          LANGS="en:English:README.md zh:中文:docs/zh/README.md ja:日本語:docs/ja/README.md fr:Français:docs/fr/README.md"
          LANGUAGES=""
          for item in $LANGS; do
            code="${item%%:*}"
            rest="${item#*:}"
            label="${rest%%:*}"
            path="${rest#*:}"
            [ -n "$LANGUAGES" ] && LANGUAGES="$LANGUAGES &nbsp;|&nbsp; "
            if [ "$code" = "$LANG" ]; then
              LANGUAGES="$LANGUAGES$label"
            else
              LANGUAGES="$LANGUAGES<a href=\"$path\">$label</a>"
            fi
          done

          TITLE=$(jq -r '.title' "$DATA")
          VERSION="$APP_VERSION"
          FLUTTER_VER="$FLUTTER_VERSION"
          CROC_VER="$CROC_VERSION"
          TAGLINE=$(jq -r '.tagline_block' "$DATA")
          BUILDING=$(jq -r '.building' "$DATA")
          H_FEATURES=$(jq -r '.headings.features' "$DATA")
          H_BUILD=$(jq -r '.headings.build' "$DATA")
          H_ARCH=$(jq -r '.headings.architecture' "$DATA")
          H_STACK=$(jq -r '.headings.stack' "$DATA")
          H_I18N=$(jq -r '.headings.i18n' "$DATA")
          H_ACKS=$(jq -r '.headings.acknowledgments' "$DATA")
          H_LICENSE=$(jq -r '.headings.license' "$DATA")
          ARCH_LIB=$(jq -r '.arch_tree.lib' "$DATA")
          ARCH_GO=$(jq -r '.arch_tree.go_bridge' "$DATA")
          ARCH_SUB=$(jq -r '.arch_tree.submodules' "$DATA")
          ARCH_ASSETS=$(jq -r '.arch_tree.assets' "$DATA")
          ARCH_PLAT=$(jq -r '.arch_tree.platforms' "$DATA")
          ARCH_CI=$(jq -r '.arch_tree.ci' "$DATA")
          STACK_CL=$(jq -r '.stack_tree.col_layer' "$DATA")
          STACK_CT=$(jq -r '.stack_tree.col_tech' "$DATA")
          STACK_L_UI=$(jq -r '.stack_tree.l_ui' "$DATA")
          STACK_L_STATE=$(jq -r '.stack_tree.l_state' "$DATA")
          STACK_L_BACKEND=$(jq -r '.stack_tree.l_backend' "$DATA")
          STACK_L_I18N=$(jq -r '.stack_tree.l_i18n' "$DATA")
          STACK_L_CI=$(jq -r '.stack_tree.l_ci' "$DATA")
          STACK_UI=$(jq -r '.stack_tree.ui' "$DATA")
          STACK_STATE=$(jq -r '.stack_tree.state' "$DATA")
          STACK_BACKEND=$(jq -r '.stack_tree.backend' "$DATA")
          STACK_I18N=$(jq -r '.stack_tree.i18n' "$DATA")
          STACK_CI=$(jq -r '.stack_tree.ci' "$DATA")
          ACK_CP=$(jq -r '.ack_tree.col_project' "$DATA")
          ACK_CD=$(jq -r '.ack_tree.col_desc' "$DATA")
          ACK_CROC=$(jq -r '.ack_tree.croc' "$DATA")
          ACK_FLUTTER=$(jq -r '.ack_tree.flutter' "$DATA")
          ACK_FLCLASH=$(jq -r '.ack_tree.flclash' "$DATA")
          ACK_CROCAPP=$(jq -r '.ack_tree.crocapp' "$DATA")
          I18N=$(jq -r '.i18n' "$DATA")

          FEAT_PLATFORM=$(jq -r '.feat_table.platform' "$DATA")
          FEAT_ENCRYPTION=$(jq -r '.feat_table.encryption' "$DATA")
          FEAT_I18N=$(jq -r '.feat_table.i18n' "$DATA")
          FEAT_THEME=$(jq -r '.feat_table.theme' "$DATA")

          cp "$TEMPLATE" "$OUTPUT"
          sed -i "s#{{languages}}#$LANGUAGES#" "$OUTPUT"
          sed -i "s|{{title}}|$TITLE|" "$OUTPUT"
          sed -i "s|{{version}}|$VERSION|" "$OUTPUT"
          sed -i "s|{{flutter_version}}|$FLUTTER_VER|" "$OUTPUT"
          sed -i "s|{{croc_version}}|$CROC_VER|" "$OUTPUT"
          sed -i "s|{{tagline_block}}|$TAGLINE|" "$OUTPUT"
          sed -i "s|{{heading_features}}|$H_FEATURES|" "$OUTPUT"
          sed -i "s|{{heading_build}}|$H_BUILD|" "$OUTPUT"
          sed -i "s|{{heading_architecture}}|$H_ARCH|" "$OUTPUT"
          sed -i "s|{{heading_stack}}|$H_STACK|" "$OUTPUT"
          sed -i "s|{{heading_i18n}}|$H_I18N|" "$OUTPUT"
          sed -i "s|{{heading_acknowledgments}}|$H_ACKS|" "$OUTPUT"
          sed -i "s|{{heading_license}}|$H_LICENSE|" "$OUTPUT"
          sed -i "s|{{feat_platform}}|$FEAT_PLATFORM|" "$OUTPUT"
          sed -i "s|{{feat_encryption}}|$FEAT_ENCRYPTION|" "$OUTPUT"
          sed -i "s|{{feat_i18n}}|$FEAT_I18N|" "$OUTPUT"
          sed -i "s|{{feat_theme}}|$FEAT_THEME|" "$OUTPUT"
          sed -i "s|{{getting_started}}|$BUILDING|" "$OUTPUT"
          sed -i "s|{{building}}|$BUILDING|" "$OUTPUT"
          sed -i "s|{{arch_lib}}|$ARCH_LIB|" "$OUTPUT"
          sed -i "s|{{arch_go_bridge}}|$ARCH_GO|" "$OUTPUT"
          sed -i "s|{{arch_submodules}}|$ARCH_SUB|" "$OUTPUT"
          sed -i "s|{{arch_assets}}|$ARCH_ASSETS|" "$OUTPUT"
          sed -i "s|{{arch_platforms}}|$ARCH_PLAT|" "$OUTPUT"
          sed -i "s|{{arch_ci}}|$ARCH_CI|" "$OUTPUT"
          sed -i "s|{{stack_col_layer}}|$STACK_CL|" "$OUTPUT"
          sed -i "s|{{stack_col_tech}}|$STACK_CT|" "$OUTPUT"
          sed -i "s|{{stack_l_ui}}|$STACK_L_UI|" "$OUTPUT"
          sed -i "s|{{stack_l_state}}|$STACK_L_STATE|" "$OUTPUT"
          sed -i "s|{{stack_l_backend}}|$STACK_L_BACKEND|" "$OUTPUT"
          sed -i "s|{{stack_l_i18n}}|$STACK_L_I18N|" "$OUTPUT"
          sed -i "s|{{stack_l_ci}}|$STACK_L_CI|" "$OUTPUT"
          sed -i "s|{{stack_ui}}|$STACK_UI|" "$OUTPUT"
          sed -i "s|{{stack_state}}|$STACK_STATE|" "$OUTPUT"
          sed -i "s|{{stack_backend}}|$STACK_BACKEND|" "$OUTPUT"
          sed -i "s|{{stack_i18n}}|$STACK_I18N|" "$OUTPUT"
          sed -i "s|{{stack_ci}}|$STACK_CI|" "$OUTPUT"
          sed -i "s|{{i18n}}|$I18N|" "$OUTPUT"
          sed -i "s|{{ack_col_project}}|$ACK_CP|" "$OUTPUT"
          sed -i "s|{{ack_col_desc}}|$ACK_CD|" "$OUTPUT"
          sed -i "s|{{ack_croc}}|$ACK_CROC|" "$OUTPUT"
          sed -i "s|{{ack_flutter}}|$ACK_FLUTTER|" "$OUTPUT"
          sed -i "s|{{ack_flclash}}|$ACK_FLCLASH|" "$OUTPUT"
          sed -i "s|{{ack_crocapp}}|$ACK_CROCAPP|" "$OUTPUT"

          # Fix doc link paths: root README uses docs/*, docs/xx/README uses ../
          DOC_PREFIX="docs/"
          if [[ "$OUTPUT" != "README.md" ]]; then
            DOC_PREFIX="../"
          fi
          sed -i "s|](docs/|]($DOC_PREFIX|g" "$OUTPUT"

      - name: Commit README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update README [skip ci]"
            git push
          fi

  # ── Windows (AMD64 + optional ARM64 via Zig cross-compile) ──
  build-windows:
    needs: [test, prebuild]
    if: needs.prebuild.outputs.windows == 'true' || needs.prebuild.outputs.windows_arm64 == 'true'
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Pull latest (include version sync from prebuild)
        if: needs.prebuild.outputs.is_tag != 'true'
        run: git pull origin ${{ github.ref_name }}

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $env:GITHUB_OUTPUT

      - name: Get version
        id: ver
        env:
          IS_TAG: ${{ needs.prebuild.outputs.is_tag }}
          SYNCED_VER: ${{ needs.prebuild.outputs.synced_version }}
        run: |
          if ($env:IS_TAG -eq 'true') {
            $v = (Get-Content pubspec.yaml | Where-Object { $_ -match '^version:' } | Select-Object -First 1) -replace '^version:\s+(\S+).*', '$1'
          } else {
            $v = $env:SYNCED_VER
          }
          echo "version=$v" >> $env:GITHUB_OUTPUT
          echo "display_version=$($v -replace '\+.*$','')" >> $env:GITHUB_OUTPUT

      # ── Shared: Go + Flutter setup ──

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      # ════════════════════════════════════════════════════════════
      # ── AMD64: native Go build + Flutter Windows ──
      # ════════════════════════════════════════════════════════════

      - name: "[AMD64] Build Go bridge (.dll)"
        if: needs.prebuild.outputs.windows == 'true'
        run: |
          Push-Location go_bridge
          go mod tidy
          $env:CGO_ENABLED = "1"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CC = "gcc"
          go build -buildmode=c-shared -ldflags="-s -w -H windowsgui -extldflags=-Wl,--subsystem,windows" -o "$env:GITHUB_WORKSPACE\windows\runner\libcroc_bridge.dll" .
          Pop-Location

      - name: "[AMD64] Verify .dll"
        if: needs.prebuild.outputs.windows == 'true'
        run: |
          if (Test-Path windows\runner\libcroc_bridge.dll) {
            Get-Item windows\runner\libcroc_bridge.dll | Select-Object Length, FullName
          } else {
            Write-Error "libcroc_bridge.dll not found!"
          }

      - name: "[AMD64] Build Flutter Windows"
        if: needs.prebuild.outputs.windows == 'true'
        run: flutter build windows --release

      - name: "[AMD64] Bundle bridge .dll into build output"
        if: needs.prebuild.outputs.windows == 'true'
        run: Copy-Item "windows\runner\libcroc_bridge.dll" "build\windows\x64\runner\Release\libcroc_bridge.dll" -Force

      - name: "[AMD64] Package zip"
        if: needs.prebuild.outputs.windows == 'true'
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath FlCroc-${{ steps.ver.outputs.display_version }}-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        if: needs.prebuild.outputs.windows == 'true'
        with:
          name: FlCroc-${{ steps.ver.outputs.display_version }}-windows-amd64
          path: FlCroc-${{ steps.ver.outputs.display_version }}-windows-amd64.zip

      # ════════════════════════════════════════════════════════════
      # ── ARM64: Zig cross-compile Go bridge → repack AMD64 artifact ──
      # ════════════════════════════════════════════════════════════

      - name: "[ARM64] Setup Zig (cross-compiler)"
        if: needs.prebuild.outputs.windows_arm64 == 'true'
        run: |
          if (!(Get-Command zig -ErrorAction SilentlyContinue)) {
            choco install zig --no-progress -y
          }
          zig version

      - name: "[ARM64] Build Go bridge (.dll)"
        if: needs.prebuild.outputs.windows_arm64 == 'true'
        run: |
          Push-Location go_bridge
          go mod tidy
          $env:CGO_ENABLED = "1"
          $env:GOOS = "windows"
          $env:GOARCH = "arm64"
          $env:CC = "zig cc -target aarch64-windows-gnu"
          $env:CXX = "zig c++ -target aarch64-windows-gnu"
          go build -buildmode=c-shared -ldflags="-s -w -H windowsgui -extldflags=-Wl,--subsystem,windows" -o "$env:GITHUB_WORKSPACE\windows\runner\libcroc_bridge_arm64.dll" .
          Pop-Location

      - name: "[ARM64] Verify .dll"
        if: needs.prebuild.outputs.windows_arm64 == 'true'
        run: |
          if (Test-Path windows\runner\libcroc_bridge_arm64.dll) {
            Get-Item windows\runner\libcroc_bridge_arm64.dll | Select-Object Length, FullName
          } else {
            Write-Error "libcroc_bridge_arm64.dll not found!"
          }

      - name: "[ARM64] Download AMD64 artifact"
        if: needs.prebuild.outputs.windows_arm64 == 'true'
        uses: actions/download-artifact@v4
        with:
          name: FlCroc-${{ steps.ver.outputs.display_version }}-windows-amd64
          path: amd64-pkg

      - name: "[ARM64] Repack with ARM64 .dll"
        if: needs.prebuild.outputs.windows_arm64 == 'true'
        run: |
          Expand-Archive "amd64-pkg\FlCroc-${{ steps.ver.outputs.display_version }}-windows-amd64.zip" -DestinationPath arm64-repack
          Copy-Item "windows\runner\libcroc_bridge_arm64.dll" "arm64-repack\libcroc_bridge.dll" -Force
          Copy-Item "windows\runner\libcroc_bridge_arm64.dll" "arm64-repack\data\flutter_assets\libcroc_bridge.dll" -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path "arm64-repack\*" -DestinationPath FlCroc-${{ steps.ver.outputs.display_version }}-windows-arm64.zip

      - uses: actions/upload-artifact@v4
        if: needs.prebuild.outputs.windows_arm64 == 'true'
        with:
          name: FlCroc-${{ steps.ver.outputs.display_version }}-windows-arm64
          path: FlCroc-${{ steps.ver.outputs.display_version }}-windows-arm64.zip

  # ── Linux ──
  build-linux:
    needs: [test, prebuild]
    if: needs.prebuild.outputs.linux == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Pull latest (include version sync from prebuild)
        if: needs.prebuild.outputs.is_tag != 'true'
        run: git pull origin ${{ github.ref_name }}

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get version
        id: ver
        env:
          IS_TAG: ${{ needs.prebuild.outputs.is_tag }}
          SYNCED_VER: ${{ needs.prebuild.outputs.synced_version }}
        run: |
          if [ "$IS_TAG" = "true" ]; then
            V=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d+ -f1)
            echo "version=$V" >> $GITHUB_OUTPUT
            echo "display_version=$V" >> $GITHUB_OUTPUT
          else
            echo "version=$SYNCED_VER" >> $GITHUB_OUTPUT
            echo "display_version=$(echo $SYNCED_VER | cut -d+ -f1)" >> $GITHUB_OUTPUT
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Linux deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Build Go bridge (.so)
        run: |
          cd go_bridge
          go mod tidy
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -buildmode=c-shared -ldflags="-s -w" -o ../linux/flutter/ephemeral/libcroc_bridge.so .
          cd ..

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build Linux
        run: flutter build linux --release

      - name: Bundle bridge .so into build output
        run: |
          mkdir -p build/linux/x64/release/bundle/lib
          cp linux/flutter/ephemeral/libcroc_bridge.so build/linux/x64/release/bundle/lib/

      - name: Package tar
        run: tar -czf FlCroc-${{ steps.ver.outputs.display_version }}-linux-amd64.tar.gz -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-${{ steps.ver.outputs.display_version }}-linux-amd64
          path: FlCroc-${{ steps.ver.outputs.display_version }}-linux-amd64.tar.gz

  # ── Android (ARM64 + AMD64 sequential) ──
  build-android:
    needs: [test, prebuild]
    if: needs.prebuild.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Pull latest (include version sync from prebuild)
        if: needs.prebuild.outputs.is_tag != 'true'
        run: git pull origin ${{ github.ref_name }}

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get version
        id: ver
        env:
          IS_TAG: ${{ needs.prebuild.outputs.is_tag }}
          SYNCED_VER: ${{ needs.prebuild.outputs.synced_version }}
        run: |
          if [ "$IS_TAG" = "true" ]; then
            V=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d+ -f1)
            echo "version=$V" >> $GITHUB_OUTPUT
            echo "display_version=$V" >> $GITHUB_OUTPUT
          else
            echo "version=$SYNCED_VER" >> $GITHUB_OUTPUT
            echo "display_version=$(echo $SYNCED_VER | cut -d+ -f1)" >> $GITHUB_OUTPUT
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Build Go bridge (arm64 + amd64)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          cd go_bridge
          go mod tidy
          export HOST_TAG=linux-x86_64

          mkdir -p ../android/app/src/main/jniLibs/arm64-v8a
          export CC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/${HOST_TAG}/bin/aarch64-linux-android21-clang"
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 \
            go build -buildmode=c-shared -ldflags="-s -w -extldflags=-Wl,-z,max-page-size=16384" \
            -o ../android/app/src/main/jniLibs/arm64-v8a/libcroc_bridge.so .
          echo "✓ Go bridge built for Android ARM64"
          file ../android/app/src/main/jniLibs/arm64-v8a/libcroc_bridge.so

          if [ "${{ needs.prebuild.outputs.arch_all }}" = "true" ]; then
            mkdir -p ../android/app/src/main/jniLibs/x86_64
            export CC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/${HOST_TAG}/bin/x86_64-linux-android21-clang"
            CGO_ENABLED=1 GOOS=android GOARCH=amd64 \
              go build -buildmode=c-shared -ldflags="-s -w -extldflags=-Wl,-z,max-page-size=16384" \
              -o ../android/app/src/main/jniLibs/x86_64/libcroc_bridge.so .
            echo "✓ Go bridge built for Android AMD64"
            file ../android/app/src/main/jniLibs/x86_64/libcroc_bridge.so
          fi
          cd ..

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Patch Android plugin registrant
        run: |
          FILE=android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java
          sed -i 's/catch (Exception e)/catch (Throwable e)/g' "$FILE"
          rm -rf android/app/src/main/kotlin/com

      - name: Build Android ARM64
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release --target-platform android-arm64

      - name: Save ARM64 APK
        run: cp build/app/outputs/flutter-apk/app-release.apk FlCroc-${{ steps.ver.outputs.display_version }}-android-arm64.apk

      - name: Build Android AMD64
        if: needs.prebuild.outputs.arch_all == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release --target-platform android-x64

      - name: Save AMD64 APK
        if: needs.prebuild.outputs.arch_all == 'true'
        run: cp build/app/outputs/flutter-apk/app-release.apk FlCroc-${{ steps.ver.outputs.display_version }}-android-amd64.apk

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-${{ steps.ver.outputs.display_version }}-android
          path: |
            FlCroc-${{ steps.ver.outputs.display_version }}-android-arm64.apk
            FlCroc-${{ steps.ver.outputs.display_version }}-android-amd64.apk
        continue-on-error: true

  # ── Nightly release (dev branch) ──
  nightly:
    needs: [prebuild, build-windows, build-linux, build-android]
    if: |
      always() && !failure() && !cancelled() &&
      needs.prebuild.outputs.do_release == 'false' &&
      (needs.build-windows.result != 'skipped' ||
       needs.build-linux.result != 'skipped' ||
       needs.build-android.result != 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get nightly version
        id: ver
        env:
          NIGHTLY_VER: ${{ needs.prebuild.outputs.nightly_version }}
          NIGHTLY_DATE: ${{ needs.prebuild.outputs.nightly_date }}
        run: |
          echo "version=$NIGHTLY_VER" >> $GITHUB_OUTPUT
          echo "title=Nightly $NIGHTLY_VER $NIGHTLY_DATE" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f -ls

      - name: Build release body
        id: body
        env:
          MSG: ${{ github.event.head_commit.message || '' }}
          TITLE: ${{ steps.ver.outputs.title }}
        run: |
          BODY="## $TITLE

          **Commit**: \`${{ steps.sha.outputs.sha }}\`

          > $MSG

          > ⚠️ This is an automated dev-branch build. May be unstable.

          ### Downloads"
          for f in artifacts/FlCroc-*; do
            fname=$(basename "$f")
            case "$fname" in
              *windows*) icon="🪟 Windows" ;;
              *linux*)   icon="🐧 Linux" ;;
              *android*) icon="🤖 Android" ;;
              *)         icon="📦" ;;
            esac
            BODY="$BODY"$'\n'"- $icon | \`$fname\`"
          done
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Delete existing nightly release
        run: |
          if gh release view "nightly" &>/dev/null; then
            echo "Deleting existing nightly release"
            gh release delete "nightly" --yes --cleanup-tag
          else
            echo "No existing nightly release"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: ${{ steps.ver.outputs.title }}
          body: ${{ steps.body.outputs.body }}
          files: |
            artifacts/FlCroc-*
          draft: false
          prerelease: true
          make_latest: false

  # ── Production release (manual tag push or auto from release/beta commit) ──
  release:
    needs: [prebuild, build-android, build-windows, build-linux]
    if: |
      always() && !cancelled() &&
      needs.prebuild.result != 'failure' &&
      needs.build-android.result != 'failure' &&
      needs.build-linux.result != 'failure' &&
      (startsWith(github.ref, 'refs/tags/v') ||
       needs.prebuild.outputs.do_release == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Resolve version info
        id: version
        run: |
          # Prefer prebuild outputs (from release/beta commit)
          if [ "${{ needs.prebuild.outputs.do_release }}" = "true" ]; then
            VER="${{ needs.prebuild.outputs.release_version }}"
            DISPLAY_VER=$(echo "$VER" | cut -d+ -f1)
            echo "version=$DISPLAY_VER" >> $GITHUB_OUTPUT
            echo "tag=${{ needs.prebuild.outputs.release_tag }}" >> $GITHUB_OUTPUT
            echo "release_name=${{ needs.prebuild.outputs.release_name }}" >> $GITHUB_OUTPUT
          else
            # Manual tag push: parse from commit or pubspec
            COMMIT_MSG=$(git log -1 --pretty=%B)
            if echo "$COMMIT_MSG" | grep -qE '^r-[0-9]+\.[0-9]+\.[0-9]+'; then
              VERSION=$(echo "$COMMIT_MSG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
              echo "version=$VERSION" >> $GITHUB_OUTPUT
              echo "tag=v$VERSION" >> $GITHUB_OUTPUT
              echo "release_name=FlCroc $VERSION" >> $GITHUB_OUTPUT
            elif echo "$COMMIT_MSG" | grep -qE '^beta-[0-9]+\.[0-9]+\.[0-9]+'; then
              VERSION=$(echo "$COMMIT_MSG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
              echo "version=$VERSION" >> $GITHUB_OUTPUT
              echo "tag=v$VERSION-beta" >> $GITHUB_OUTPUT
              echo "release_name=FlCroc Beta $VERSION" >> $GITHUB_OUTPUT
            else
              VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d+ -f1)
              echo "version=$VERSION" >> $GITHUB_OUTPUT
              echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
              echo "release_name=FlCroc $VERSION" >> $GITHUB_OUTPUT
            fi
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f -ls

      - name: Build release body
        id: body
        run: |
          BODY="## 📦 ${{ steps.version.outputs.release_name }}

          Cross-platform file transfer GUI powered by croc.

          ### Downloads"
          for f in artifacts/FlCroc-*; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            case "$fname" in
              *windows-arm64*)          icon="🪟 Windows ARM64" ;;
              *windows*)                icon="🪟 Windows" ;;
              *linux*)                  icon="🐧 Linux" ;;
              *android-arm64*)          icon="🤖 Android ARM64" ;;
              *android*)                icon="🤖 Android" ;;
              *)                        icon="📦" ;;
            esac
            BODY="$BODY"$'\n'"- $icon | \`$fname\`"
          done
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_name }}
          body: ${{ steps.body.outputs.body }}
          files: |
            artifacts/FlCroc-*
          draft: false
          generate_release_notes: true
          make_latest: true
