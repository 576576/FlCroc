name: Build All Platforms

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25'

jobs:
  # ---- Test ----
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

  # ---- Android ARM64-v8a APK ----
  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Build croc bridge (.so) for Android ARM64
        run: |
          cd go_bridge
          go mod tidy
          export ANDROID_NDK_HOME="${ANDROID_NDK_ROOT:-$ANDROID_NDK}"
          export TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          export CC="$TOOLCHAIN/bin/aarch64-linux-android21-clang"
          export CGO_ENABLED=1
          export GOOS=android
          export GOARCH=arm64
          mkdir -p ../android/app/src/main/jniLibs/arm64-v8a
          go build -buildmode=c-shared \
            -o ../android/app/src/main/jniLibs/arm64-v8a/libcroc_bridge.so \
            -ldflags="-s -w" .

      - name: Verify .so
        run: ls -lh android/app/src/main/jniLibs/arm64-v8a/libcroc_bridge.so

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Get version
        id: ver
        run: echo "version=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d+ -f1)" >> $GITHUB_OUTPUT

      - name: Build APK
        run: flutter build apk --release --target-platform android-arm64

      - name: Rename artifact
        run: mv build/app/outputs/flutter-apk/app-release.apk FlCroc-${{ steps.ver.outputs.version }}-android-arm64.apk

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-${{ steps.ver.outputs.version }}-android-arm64
          path: FlCroc-${{ steps.ver.outputs.version }}-android-arm64.apk

  # ---- Windows AMD64 ----
  build-windows:
    needs: test
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go bridge (.dll)
        run: |
          Push-Location go_bridge
          go mod tidy
          $env:CGO_ENABLED = "1"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CC = "gcc"
          go build -buildmode=c-shared -ldflags="-s -w" -o "$env:GITHUB_WORKSPACE\windows\runner\libcroc_bridge.dll" .
          Pop-Location

      - name: Verify .dll
        run: |
          if (Test-Path windows\runner\libcroc_bridge.dll) {
            Get-Item windows\runner\libcroc_bridge.dll | Select-Object Length, FullName
          } else {
            Write-Error "libcroc_bridge.dll not found!"
          }

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Get version
        id: ver
        run: |
          $v = (Get-Content pubspec.yaml | Where-Object { $_ -match '^version:' } | Select-Object -First 1) -replace '^version:\s+(\S+).*', '$1'
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Build Windows
        run: flutter build windows --release

      - name: Bundle bridge .dll into build output
        run: |
          $outDir = "build\windows\x64\runner\Release"
          Copy-Item "windows\runner\libcroc_bridge.dll" "$outDir\libcroc_bridge.dll" -Force
          Write-Host "Bundled bridge .dll into $outDir"

      - name: Package zip
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath FlCroc-${{ steps.ver.outputs.version }}-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-${{ steps.ver.outputs.version }}-windows-amd64
          path: FlCroc-${{ steps.ver.outputs.version }}-windows-amd64.zip

  # ---- Linux AMD64 ----
  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go bridge (.so)
        run: |
          cd go_bridge
          go mod tidy
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -buildmode=c-shared -ldflags="-s -w" -o /tmp/libcroc_bridge.so .
          mkdir -p "$GITHUB_WORKSPACE/linux/flutter/ephemeral"
          cp /tmp/libcroc_bridge.so "$GITHUB_WORKSPACE/linux/flutter/ephemeral/libcroc_bridge.so"

      - name: Verify .so
        run: |
          ls -lh linux/flutter/ephemeral/libcroc_bridge.so
          file linux/flutter/ephemeral/libcroc_bridge.so

      - name: Install Linux build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Get version
        id: ver
        run: echo "version=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d+ -f1)" >> $GITHUB_OUTPUT

      - name: Build Linux
        run: flutter build linux --release

      - name: Bundle bridge .so into build output
        run: |
          mkdir -p build/linux/x64/release/bundle/lib
          cp linux/flutter/ephemeral/libcroc_bridge.so build/linux/x64/release/bundle/lib/libcroc_bridge.so

      - name: Create .deb package
        run: |
          APPNAME=flcroc
          VERSION=${{ steps.ver.outputs.version }}
          DEB_NAME="FlCroc-${VERSION}-linux-amd64.deb"
          PKG_DIR="build/linux_deb/${APPNAME}_${VERSION}_amd64"
          mkdir -p "${PKG_DIR}/DEBIAN" "${PKG_DIR}/opt/${APPNAME}" "${PKG_DIR}/usr/share/applications" "${PKG_DIR}/usr/local/bin"
          cp -r build/linux/x64/release/bundle/* "${PKG_DIR}/opt/${APPNAME}/"
          chmod +x "${PKG_DIR}/opt/${APPNAME}/fl_croc"
          cat > "${PKG_DIR}/DEBIAN/control" << EOF
          Package: flcroc
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: FlCroc Team
          Description: FlCroc - GUI client for croc file transfer
           A cross-platform Flutter GUI for croc, enabling easy and secure
           file transfers between computers with Material 3 design.
          EOF
          cat > "${PKG_DIR}/usr/share/applications/flcroc.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=FlCroc
          Comment=Secure file transfer GUI
          Exec=/opt/flcroc/fl_croc
          Icon=flcroc
          Terminal=false
          Type=Application
          Categories=Utility;Network;
          DESKTOP
          ln -s "/opt/${APPNAME}/fl_croc" "${PKG_DIR}/usr/local/bin/flcroc"
          dpkg-deb --build "${PKG_DIR}"
          mv "${PKG_DIR}.deb" "${DEB_NAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-${{ steps.ver.outputs.version }}-linux-amd64
          path: FlCroc-${{ steps.ver.outputs.version }}-linux-amd64.deb

  # ---- Release (on tag push) ----
  release:
    needs: [build-android, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"

          if echo "$COMMIT_MSG" | grep -qE '^release-[0-9]+\.[0-9]+\.[0-9]+'; then
            VERSION=$(echo "$COMMIT_MSG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=v$VERSION" >> $GITHUB_OUTPUT
            echo "release_name=FlCroc $VERSION" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qE '^beta-[0-9]+\.[0-9]+\.[0-9]+'; then
            VERSION=$(echo "$COMMIT_MSG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=v$VERSION-beta" >> $GITHUB_OUTPUT
            echo "release_name=FlCroc Beta $VERSION" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d+ -f1)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            TAG_NAME="${{ github.ref_name }}"
            echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
            echo "release_name=FlCroc $VERSION" >> $GITHUB_OUTPUT
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f -ls

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_name }}
          body: |
            ## 📦 ${{ steps.version.outputs.release_name }}

            Cross-platform file transfer GUI powered by croc.

            ### Downloads
            | Platform | File |
            |----------|------|
            | 🪟 Windows | `FlCroc-${{ steps.version.outputs.version }}-windows-amd64.zip` |
            | 🐧 Linux | `FlCroc-${{ steps.version.outputs.version }}-linux-amd64.deb` |
            | 🤖 Android | `FlCroc-${{ steps.version.outputs.version }}-android-arm64.apk` |

            ### What's Changed
            (auto-generated release notes below)
          files: |
            artifacts/FlCroc-*-android-arm64.apk
            artifacts/FlCroc-*-windows-amd64.zip
            artifacts/FlCroc-*-linux-amd64.deb
          draft: false
          generate_release_notes: true
          make_latest: true
