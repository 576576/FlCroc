name: Build All Platforms

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25'

jobs:
  # ---- Test ----
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

  # ---- Android ARM64-v8a APK ----
  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Build croc bridge (.so) for Android ARM64
        run: |
          cd go_bridge
          go mod tidy
          export ANDROID_NDK_HOME="${ANDROID_NDK_ROOT:-$ANDROID_NDK}"
          export TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          export CC="$TOOLCHAIN/bin/aarch64-linux-android21-clang"
          export CGO_ENABLED=1
          export GOOS=android
          export GOARCH=arm64
          mkdir -p ../android/app/src/main/jniLibs/arm64-v8a
          go build -buildmode=c-shared \
            -o ../android/app/src/main/jniLibs/arm64-v8a/libcroc_bridge.so \
            -ldflags="-s -w" .

      - name: Verify .so
        run: ls -lh android/app/src/main/jniLibs/arm64-v8a/libcroc_bridge.so

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --target-platform android-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-android-arm64-v8a
          path: build/app/outputs/flutter-apk/app-release.apk

  # ---- Windows AMD64 ----
  build-windows:
    needs: test
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build croc.exe from source
        run: |
          Push-Location lib\croc
          $env:CGO_ENABLED = "0"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -ldflags="-s -w" -o "$env:GITHUB_WORKSPACE\windows\runner\croc.exe" .
          Pop-Location

      - name: Verify croc.exe
        run: |
          if (Test-Path windows\runner\croc.exe) {
            Get-Item windows\runner\croc.exe | Select-Object Length, FullName
          } else {
            Write-Error "croc.exe not found!"
          }

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Bundle croc.exe into build output
        run: |
          $outDir = "build\windows\x64\runner\Release"
          Copy-Item "windows\runner\croc.exe" "$outDir\croc.exe" -Force
          Write-Host "Bundled croc.exe into $outDir"

      - name: Package zip
        run: |
          $src = "build\windows\x64\runner\Release"
          Compress-Archive -Path "$src\*" -DestinationPath FlCroc-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-windows-amd64
          path: FlCroc-windows-amd64.zip

  # ---- Linux AMD64 ----
  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build croc from source
        run: |
          cd lib/croc
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o /tmp/croc .
          mkdir -p "$GITHUB_WORKSPACE/linux/flutter/ephemeral"
          cp /tmp/croc "$GITHUB_WORKSPACE/linux/flutter/ephemeral/croc"
          chmod +x "$GITHUB_WORKSPACE/linux/flutter/ephemeral/croc"

      - name: Verify croc
        run: |
          ls -lh linux/flutter/ephemeral/croc
          file linux/flutter/ephemeral/croc

      - name: Install Linux build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Bundle croc into build output
        run: |
          cp linux/flutter/ephemeral/croc build/linux/x64/release/bundle/croc
          chmod +x build/linux/x64/release/bundle/croc
          echo "Bundled croc into bundle"

      - name: Create .deb package
        run: |
          APPNAME=flcroc
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d+ -f1)
          PKG_DIR="build/linux_deb/${APPNAME}_${VERSION}_amd64"
          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/opt/${APPNAME}"
          mkdir -p "${PKG_DIR}/usr/share/applications"
          mkdir -p "${PKG_DIR}/usr/local/bin"

          cp -r build/linux/x64/release/bundle/* "${PKG_DIR}/opt/${APPNAME}/"
          chmod +x "${PKG_DIR}/opt/${APPNAME}/fl_croc"
          chmod +x "${PKG_DIR}/opt/${APPNAME}/croc" 2>/dev/null || true

          cat > "${PKG_DIR}/DEBIAN/control" << EOF
          Package: flcroc
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: FlCroc Team
          Description: FlCroc - GUI client for croc file transfer
           A cross-platform Flutter GUI for croc, enabling easy and secure
           file transfers between computers with Material 3 design.
          EOF

          cat > "${PKG_DIR}/usr/share/applications/flcroc.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=FlCroc
          Comment=Secure file transfer GUI
          Exec=/opt/flcroc/fl_croc
          Icon=flcroc
          Terminal=false
          Type=Application
          Categories=Utility;Network;
          DESKTOP

          ln -s "/opt/${APPNAME}/fl_croc" "${PKG_DIR}/usr/local/bin/flcroc"
          dpkg-deb --build "${PKG_DIR}"

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-linux-amd64-deb
          path: build/linux_deb/flcroc_*_amd64.deb

  # ---- Release (on tag push) ----
  release:
    needs: [build-android, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -ls

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/FlCroc-android-arm64-v8a/app-release.apk
            artifacts/FlCroc-windows-amd64/FlCroc-windows-amd64.zip
            artifacts/FlCroc-linux-amd64-deb/*.deb
          draft: false
          generate_release_notes: true
