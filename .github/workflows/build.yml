name: Build All Platforms

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25'

jobs:
  # ── Version sync (only on "update-ver" commit or manual dispatch) ──
  sync-ver:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, 'update-ver'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      skip_build: ${{ steps.check_skip.outputs.skip_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Check for skip-build flag
        id: check_skip
        env:
          MSG: ${{ github.event.head_commit.message }}
        run: |
          if echo "$MSG" | grep -qi 'skip-build'; then
            echo "skip_build=true" >> $GITHUB_OUTPUT
            echo "⚠️  skip-build detected — test & build will be skipped"
          else
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Read version.properties
        id: props
        run: |
          FLCROC=$(grep '^flcroc=' version.properties | cut -d= -f2)
          CROC=$(grep '^croc=' version.properties | cut -d= -f2)
          echo "flcroc=$FLCROC" >> $GITHUB_OUTPUT
          echo "croc=$CROC" >> $GITHUB_OUTPUT

      - name: Update pubspec.yaml version
        run: |
          VER="${{ steps.props.outputs.flcroc }}"
          sed -i "s/^version: .*/version: $VER/" pubspec.yaml

      - name: Determine croc tag
        id: croc_tag
        run: |
          CROC="${{ steps.props.outputs.croc }}"
          if [ "$CROC" = "keep" ] || [ "$CROC" = "0" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT; echo "tag=$CROC" >> $GITHUB_OUTPUT; exit 0
          fi
          if [ "$CROC" = "latest" ]; then
            TAG=$(curl -s https://api.github.com/repos/schollz/croc/releases/latest | jq -r .tag_name)
            [ -z "$TAG" ] || [ "$TAG" = "null" ] && echo "Failed to fetch croc tag" && exit 1
          else
            TAG="$CROC"
          fi
          echo "skip=false" >> $GITHUB_OUTPUT; echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Sync vendored croc source
        if: steps.croc_tag.outputs.skip != 'true'
        run: |
          TAG="${{ steps.croc_tag.outputs.tag }}"
          TMPDIR=$(mktemp -d)
          git clone --depth 1 --branch "$TAG" --filter=blob:none https://github.com/schollz/croc.git "$TMPDIR"
          rm -rf "$TMPDIR/.github"
          rm -rf lib/croc/*
          cp -r "$TMPDIR"/* lib/croc/
          cp "$TMPDIR"/.gitignore lib/croc/ 2>/dev/null || true
          rm -rf "$TMPDIR"
          find lib/croc -name '*_test.go' -delete
          cd go_bridge && go mod tidy && cd ..

      - name: Update version.properties croc entry
        if: steps.croc_tag.outputs.skip != 'true'
        run: |
          TAG="${{ steps.croc_tag.outputs.tag }}"
          sed -i "s/^croc=.*/croc=$TAG/" version.properties

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml version.properties lib/croc
          git diff --cached --quiet && exit 0
          git commit -m "update-ver: FlCroc ${{ steps.props.outputs.flcroc }}, croc ${{ steps.croc_tag.outputs.tag }} [skip ci]"
          git push

  # ---- Test ----
  test:
    needs: sync-ver
    if: |
      always() && !failure() && !cancelled() &&
      needs.sync-ver.outputs.skip_build != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

  # ---- Android ARM64-v8a APK ----
  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Build croc bridge (.so) for Android ARM64
        run: |
          cd go_bridge
          go mod tidy
          export ANDROID_NDK_HOME="${ANDROID_NDK_ROOT:-$ANDROID_NDK}"
          export TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          export CC="$TOOLCHAIN/bin/aarch64-linux-android21-clang"
          export CGO_ENABLED=1
          export GOOS=android
          export GOARCH=arm64
          mkdir -p ../android/app/src/main/jniLibs/arm64-v8a
          go build -buildmode=c-shared \
            -o ../android/app/src/main/jniLibs/arm64-v8a/libcroc_bridge.so \
            -ldflags="-s -w" .

      - name: Verify .so
        run: ls -lh android/app/src/main/jniLibs/arm64-v8a/libcroc_bridge.so

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Get version
        id: ver
        run: echo "version=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d+ -f1)" >> $GITHUB_OUTPUT

      - name: Build APK
        run: flutter build apk --release --target-platform android-arm64

      - name: Rename artifact
        run: mv build/app/outputs/flutter-apk/app-release.apk FlCroc-${{ steps.ver.outputs.version }}-android-arm64.apk

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-${{ steps.ver.outputs.version }}-android-arm64
          path: FlCroc-${{ steps.ver.outputs.version }}-android-arm64.apk

  # ---- Windows AMD64 ----
  build-windows:
    needs: test
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go bridge (.dll)
        run: |
          Push-Location go_bridge
          go mod tidy
          $env:CGO_ENABLED = "1"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CC = "gcc"
          go build -buildmode=c-shared -ldflags="-s -w" -o "$env:GITHUB_WORKSPACE\windows\runner\libcroc_bridge.dll" .
          Pop-Location

      - name: Verify .dll
        run: |
          if (Test-Path windows\runner\libcroc_bridge.dll) {
            Get-Item windows\runner\libcroc_bridge.dll | Select-Object Length, FullName
          } else {
            Write-Error "libcroc_bridge.dll not found!"
          }

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Get version
        id: ver
        run: |
          $v = (Get-Content pubspec.yaml | Where-Object { $_ -match '^version:' } | Select-Object -First 1) -replace '^version:\s+(\S+).*', '$1'
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Build Windows
        run: flutter build windows --release

      - name: Bundle bridge .dll into build output
        run: |
          $outDir = "build\windows\x64\runner\Release"
          Copy-Item "windows\runner\libcroc_bridge.dll" "$outDir\libcroc_bridge.dll" -Force
          Write-Host "Bundled bridge .dll into $outDir"

      - name: Package zip
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath FlCroc-${{ steps.ver.outputs.version }}-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-${{ steps.ver.outputs.version }}-windows-amd64
          path: FlCroc-${{ steps.ver.outputs.version }}-windows-amd64.zip

  # ---- Linux AMD64 ----
  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go bridge (.so)
        run: |
          cd go_bridge
          go mod tidy
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -buildmode=c-shared -ldflags="-s -w" -o /tmp/libcroc_bridge.so .
          mkdir -p "$GITHUB_WORKSPACE/linux/flutter/ephemeral"
          cp /tmp/libcroc_bridge.so "$GITHUB_WORKSPACE/linux/flutter/ephemeral/libcroc_bridge.so"

      - name: Verify .so
        run: |
          ls -lh linux/flutter/ephemeral/libcroc_bridge.so
          file linux/flutter/ephemeral/libcroc_bridge.so

      - name: Install Linux build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Get version
        id: ver
        run: echo "version=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d+ -f1)" >> $GITHUB_OUTPUT

      - name: Build Linux
        run: flutter build linux --release

      - name: Bundle bridge .so into build output
        run: |
          mkdir -p build/linux/x64/release/bundle/lib
          cp linux/flutter/ephemeral/libcroc_bridge.so build/linux/x64/release/bundle/lib/libcroc_bridge.so

      - name: Create .deb package
        run: |
          APPNAME=flcroc
          VERSION=${{ steps.ver.outputs.version }}
          DEB_NAME="FlCroc-${VERSION}-linux-amd64.deb"
          PKG_DIR="build/linux_deb/${APPNAME}_${VERSION}_amd64"
          mkdir -p "${PKG_DIR}/DEBIAN" "${PKG_DIR}/opt/${APPNAME}" "${PKG_DIR}/usr/share/applications" "${PKG_DIR}/usr/local/bin"
          cp -r build/linux/x64/release/bundle/* "${PKG_DIR}/opt/${APPNAME}/"
          chmod +x "${PKG_DIR}/opt/${APPNAME}/fl_croc"
          cat > "${PKG_DIR}/DEBIAN/control" << EOF
          Package: flcroc
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: FlCroc Team
          Description: FlCroc - GUI client for croc file transfer
           A cross-platform Flutter GUI for croc, enabling easy and secure
           file transfers between computers with Material 3 design.
          EOF
          cat > "${PKG_DIR}/usr/share/applications/flcroc.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=FlCroc
          Comment=Secure file transfer GUI
          Exec=/opt/flcroc/fl_croc
          Icon=flcroc
          Terminal=false
          Type=Application
          Categories=Utility;Network;
          DESKTOP
          ln -s "/opt/${APPNAME}/fl_croc" "${PKG_DIR}/usr/local/bin/flcroc"
          dpkg-deb --build "${PKG_DIR}"
          mv "${PKG_DIR}.deb" "${DEB_NAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-${{ steps.ver.outputs.version }}-linux-amd64
          path: FlCroc-${{ steps.ver.outputs.version }}-linux-amd64.deb

  # ---- Release (on tag push) ----
  release:
    needs: [build-android, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Determine version
        id: version
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"

          if echo "$COMMIT_MSG" | grep -qE '^release-[0-9]+\.[0-9]+\.[0-9]+'; then
            VERSION=$(echo "$COMMIT_MSG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=v$VERSION" >> $GITHUB_OUTPUT
            echo "release_name=FlCroc $VERSION" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qE '^beta-[0-9]+\.[0-9]+\.[0-9]+'; then
            VERSION=$(echo "$COMMIT_MSG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=v$VERSION-beta" >> $GITHUB_OUTPUT
            echo "release_name=FlCroc Beta $VERSION" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d+ -f1)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            TAG_NAME="${{ github.ref_name }}"
            echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
            echo "release_name=FlCroc $VERSION" >> $GITHUB_OUTPUT
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f -ls

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_name }}
          body: |
            ## 📦 ${{ steps.version.outputs.release_name }}

            Cross-platform file transfer GUI powered by croc.

            ### Downloads
            | Platform | File |
            |----------|------|
            | 🪟 Windows | `FlCroc-${{ steps.version.outputs.version }}-windows-amd64.zip` |
            | 🐧 Linux | `FlCroc-${{ steps.version.outputs.version }}-linux-amd64.deb` |
            | 🤖 Android | `FlCroc-${{ steps.version.outputs.version }}-android-arm64.apk` |

            ### What's Changed
            (auto-generated release notes below)
          files: |
            artifacts/FlCroc-*-android-arm64.apk
            artifacts/FlCroc-*-windows-amd64.zip
            artifacts/FlCroc-*-linux-amd64.deb
          draft: false
          generate_release_notes: true
          make_latest: true
