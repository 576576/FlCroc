name: Update Version & Sync Croc

on:
  push:
    branches:
      - '**'
    # Only trigger when the commit message starts with "update-ver"
    # GitHub Actions doesn't support commit-message filters natively,
    # so we use a condition in each job/step.
  workflow_dispatch:
    inputs:
      flcroc_ver:
        description: 'FlCroc version (e.g. 1.0.2)'
        required: true
      croc_ver:
        description: 'croc version (e.g. v10.4.4 or latest)'
        required: true
        default: 'latest'

concurrency:
  group: update-ver-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    # Only run automatically if the commit message title contains "update-ver"
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, 'update-ver')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Read version.properties
        id: props
        run: |
          FLCROC=$(grep '^flcroc=' version.properties | cut -d= -f2)
          CROC=$(grep '^croc=' version.properties | cut -d= -f2)
          # Override from manual dispatch if set
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FLCROC="${{ inputs.flcroc_ver }}"
            CROC="${{ inputs.croc_ver }}"
          fi
          echo "flcroc=$FLCROC" >> $GITHUB_OUTPUT
          echo "croc=$CROC" >> $GITHUB_OUTPUT

      - name: Update pubspec.yaml version
        run: |
          VER="${{ steps.props.outputs.flcroc }}"
          sed -i "s/^version: .*/version: $VER/" pubspec.yaml
          echo "pubspec.yaml updated to version $VER"

      - name: Determine croc tag
        id: croc_tag
        run: |
          CROC="${{ steps.props.outputs.croc }}"
          if [ "$CROC" = "keep" ] || [ "$CROC" = "0" ]; then
            echo "croc=keep — skipping source sync"
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "tag=$CROC" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ "$CROC" = "latest" ]; then
            echo "Fetching latest croc release..."
            TAG=$(curl -s https://api.github.com/repos/schollz/croc/releases/latest | jq -r .tag_name)
            if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
              echo "Failed to fetch latest croc release tag"
              exit 1
            fi
            echo "Latest croc tag: $TAG"
          else
            TAG="$CROC"
          fi
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Sync vendored croc source
        if: steps.croc_tag.outputs.skip != 'true'
        run: |
          TAG="${{ steps.croc_tag.outputs.tag }}"
          TMPDIR=$(mktemp -d)

          echo "Cloning croc $TAG (excluding .github)..."
          git clone --depth 1 --branch "$TAG" --filter=blob:none \
            https://github.com/schollz/croc.git "$TMPDIR"

          # Remove .github if it exists
          rm -rf "$TMPDIR/.github"

          # Sync into lib/croc/
          rm -rf lib/croc/*
          cp -r "$TMPDIR"/* lib/croc/
          cp "$TMPDIR"/.gitignore lib/croc/ 2>/dev/null || true
          rm -rf "$TMPDIR"

          echo "Vendored croc $TAG synced to lib/croc/"

          # Remove test files to keep the vendored source lean
          find lib/croc -name '*_test.go' -delete
          echo "Test files removed"

      - name: Update go_bridge/go.mod replace directive
        if: steps.croc_tag.outputs.skip != 'true'
        run: |
          # Ensure go.mod references the vendored croc correctly
          cd go_bridge
          if grep -q 'replace github.com/schollz/croc/v10' go.mod; then
            # replace directive exists — keep it (already points to ../lib/croc)
            echo "replace directive already present"
          else
            echo 'replace github.com/schollz/croc/v10 => ../lib/croc' >> go.mod
          fi
          go mod tidy
          cd ..

      - name: Update version.properties croc entry
        if: steps.croc_tag.outputs.skip != 'true'
        run: |
          TAG="${{ steps.croc_tag.outputs.tag }}"
          sed -i "s/^croc=.*/croc=$TAG/" version.properties
          echo "version.properties croc updated to $TAG"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pubspec.yaml version.properties lib/croc/ go_bridge/go.mod go_bridge/go.sum
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          FLCROC="${{ steps.props.outputs.flcroc }}"
          CROC="${{ steps.croc_tag.outputs.tag }}"
          git commit -m "update-ver: FlCroc $FLCROC, croc $CROC [skip ci]"
          git push
