name: Build (dev)

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25'

jobs:
  # ── Prebuild: submodule update + platform detection ──
  prebuild:
    runs-on: ubuntu-latest
    outputs:
      windows: ${{ steps.platform.outputs.windows }}
      linux: ${{ steps.platform.outputs.linux }}
      android: ${{ steps.platform.outputs.android }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Update submodule to latest croc
        run: |
          cd lib/croc
          # Retry fetch up to 3 times (GitHub transient 502 errors)
          for i in 1 2 3; do
            echo "Attempt $i..."
            git fetch --tags --depth 1 && break
            sleep $((i * 5))
          done || echo "⚠️ Fetch failed — using existing submodule ref"
          # Try checkout; fall back to current HEAD on failure
          latest=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -n "$latest" ]; then
            git checkout "$latest" 2>/dev/null || echo "⚠️ Checkout failed — using existing ref"
          fi
          cd ../..
          find lib/croc -name '*_test.go' -delete

      - name: Determine platforms
        id: platform
        env:
          MSG: ${{ github.event.head_commit.message || '' }}
        run: |
          W='false'; L='false'; A='false'
          case "$MSG" in
            *b-win*) W='true' ;;
            *b-linux*)  L='true' ;;
            *b-mobile*) A='true' ;;
            *b-all*) W='true'; L='true'; A='true' ;;
          esac
          echo "windows=$W" >> $GITHUB_OUTPUT
          echo "linux=$L" >> $GITHUB_OUTPUT
          echo "android=$A" >> $GITHUB_OUTPUT
          echo "Platforms → windows:$W linux:$L android:$A"

  test:
    needs: prebuild
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Run tests
        run: flutter test

  build-windows:
    needs: [test, prebuild]
    if: needs.prebuild.outputs.windows == 'true'
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $env:GITHUB_OUTPUT

      - name: Get nightly version
        id: ver
        env:
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          $date = Get-Date -Format "MMdd"
          $nv = "nightly-$date-$env:SHA"
          echo "version=$nv" >> $env:GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go bridge (.dll)
        run: |
          Push-Location go_bridge
          go mod tidy
          $env:CGO_ENABLED = "1"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CC = "gcc"
          go build -buildmode=c-shared -ldflags="-s -w" -o "$env:GITHUB_WORKSPACE\windows\runner\libcroc_bridge.dll" .
          Pop-Location

      - name: Verify .dll
        run: |
          if (Test-Path windows\runner\libcroc_bridge.dll) {
            Get-Item windows\runner\libcroc_bridge.dll | Select-Object Length, FullName
          } else {
            Write-Error "libcroc_bridge.dll not found!"
          }

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Bundle bridge .dll into build output
        run: |
          $outDir = "build\windows\x64\runner\Release"
          Copy-Item "windows\runner\libcroc_bridge.dll" "$outDir\libcroc_bridge.dll" -Force

      - name: Package zip
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath FlCroc-${{ steps.ver.outputs.version }}-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-${{ steps.ver.outputs.version }}-windows-amd64
          path: FlCroc-${{ steps.ver.outputs.version }}-windows-amd64.zip

  # ── Linux ──
  build-linux:
    needs: [test, prebuild]
    if: needs.prebuild.outputs.linux == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get nightly version
        id: ver
        env:
          SHA: ${{ steps.sha.outputs.sha }}
        run: echo "version=nightly-$(date +%m%d)-$SHA" >> $GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Linux deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Build Go bridge (.so)
        run: |
          cd go_bridge
          go mod tidy
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -buildmode=c-shared -ldflags="-s -w" -o ../linux/flutter/ephemeral/libcroc_bridge.so .
          cd ..

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Bundle bridge .so into build output
        run: |
          mkdir -p build/linux/x64/release/bundle/lib
          cp linux/flutter/ephemeral/libcroc_bridge.so build/linux/x64/release/bundle/lib/

      - name: Package tar
        run: tar -czf FlCroc-${{ steps.ver.outputs.version }}-linux-amd64.tar.gz -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-${{ steps.ver.outputs.version }}-linux-amd64
          path: FlCroc-${{ steps.ver.outputs.version }}-linux-amd64.tar.gz

  # ── Android ──
  build-android:
    needs: [test, prebuild]
    if: needs.prebuild.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get nightly version
        id: ver
        env:
          SHA: ${{ steps.sha.outputs.sha }}
        run: echo "version=nightly-$(date +%m%d)-$SHA" >> $GITHUB_OUTPUT

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Patch Android plugin registrant (catch Error too)
        run: |
          FILE=android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java
          sed -i 's/catch (Exception e)/catch (Throwable e)/g' "$FILE"
          # Remove old package path leftover from rename
          rm -rf android/app/src/main/kotlin/com

      - name: Build Android
        run: flutter build apk --release --target-platform android-arm64

      - name: Rename artifact
        run: mv build/app/outputs/flutter-apk/app-release.apk FlCroc-${{ steps.ver.outputs.version }}-android-arm64.apk

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-${{ steps.ver.outputs.version }}-android-arm64
          path: FlCroc-${{ steps.ver.outputs.version }}-android-arm64.apk

  # ── Nightly release ──
  nightly:
    needs: [prebuild, build-windows, build-linux, build-android]
    if: |
      always() && !failure() && !cancelled() &&
      (needs.build-windows.result != 'skipped' ||
       needs.build-linux.result != 'skipped' ||
       needs.build-android.result != 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get nightly version
        id: ver
        env:
          SHA: ${{ steps.sha.outputs.sha }}
        run: echo "version=nightly-$(date +%m%d)-$SHA" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f -ls

      - name: Build release body
        id: body
        env:
          MSG: ${{ github.event.head_commit.message || '' }}
        run: |
          BODY="## 🌙 ${{ steps.ver.outputs.version }}

          **Commit**: \`${{ steps.sha.outputs.sha }}\`

          > $MSG

          > ⚠️ This is an automated dev-branch build. May be unstable.

          ### Downloads"
          for f in artifacts/FlCroc-*; do
            fname=$(basename "$f")
            case "$fname" in
              *windows*) icon="🪟 Windows" ;;
              *linux*)   icon="🐧 Linux" ;;
              *android*) icon="🤖 Android" ;;
              *)         icon="📦" ;;
            esac
            BODY="$BODY"$'\n'"- $icon | \`$fname\`"
          done
          # Multi-line output
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Delete existing nightly release
        run: |
          if gh release view "nightly" &>/dev/null; then
            echo "Deleting existing nightly release"
            gh release delete "nightly" --yes --cleanup-tag
          else
            echo "No existing nightly release"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: ${{ steps.ver.outputs.version }}
          body: ${{ steps.body.outputs.body }}
          files: |
            artifacts/FlCroc-*
          draft: false
          prerelease: true
          make_latest: false
