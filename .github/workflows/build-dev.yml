name: Build (dev)

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25'

jobs:
  # ── Version sync (only on "update-ver" commit) ──
  sync-ver:
    if: contains(github.event.head_commit.message, 'update-ver')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      skip_build: ${{ steps.check_skip.outputs.skip_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Check for skip-build flag
        id: check_skip
        run: |
          if echo "${{ github.event.head_commit.message }}" | grep -qi 'skip-build'; then
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi
      - name: Read version.properties
        id: props
        run: |
          FLCROC=$(grep '^flcroc=' version.properties | cut -d= -f2)
          CROC=$(grep '^croc=' version.properties | cut -d= -f2)
          echo "flcroc=$FLCROC" >> $GITHUB_OUTPUT
          echo "croc=$CROC" >> $GITHUB_OUTPUT
      - name: Update pubspec.yaml version
        run: sed -i "s/^version: .*/version: ${{ steps.props.outputs.flcroc }}/" pubspec.yaml
      - name: Determine croc tag
        id: croc_tag
        run: |
          CROC="${{ steps.props.outputs.croc }}"
          if [ "$CROC" = "keep" ] || [ "$CROC" = "0" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT; exit 0
          fi
          if [ "$CROC" = "latest" ]; then
            TAG=$(curl -s https://api.github.com/repos/schollz/croc/releases/latest | jq -r .tag_name)
            [ -z "$TAG" ] || [ "$TAG" = "null" ] && exit 1
          else TAG="$CROC"; fi
          echo "skip=false" >> $GITHUB_OUTPUT; echo "tag=$TAG" >> $GITHUB_OUTPUT
      - name: Sync vendored croc source
        if: steps.croc_tag.outputs.skip != 'true'
        run: |
          TMPDIR=$(mktemp -d)
          git clone --depth 1 --branch "${{ steps.croc_tag.outputs.tag }}" --filter=blob:none https://github.com/schollz/croc.git "$TMPDIR"
          rm -rf "$TMPDIR/.github" lib/croc/*
          cp -r "$TMPDIR"/* lib/croc/
          cp "$TMPDIR"/.gitignore lib/croc/ 2>/dev/null || true
          rm -rf "$TMPDIR"
          find lib/croc -name '*_test.go' -delete
          cd go_bridge && go mod tidy && cd ..
      - name: Update version.properties croc entry
        if: steps.croc_tag.outputs.skip != 'true'
        run: sed -i "s/^croc=.*/croc=${{ steps.croc_tag.outputs.tag }}/" version.properties
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml version.properties lib/croc/ go_bridge/go.mod go_bridge/go.sum
          git diff --cached --quiet && exit 0
          git commit -m "update-ver: FlCroc ${{ steps.props.outputs.flcroc }}, croc ${{ steps.croc_tag.outputs.tag }} [skip ci]"
          git push

  test:
    needs: sync-ver
    if: |
      always() && !failure() && !cancelled() &&
      needs.sync-ver.outputs.skip_build != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Run tests
        run: flutter test

  # ── Determine which platforms to build from commit message ──
  determine:
    needs: test
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    outputs:
      windows: ${{ steps.check.outputs.windows }}
      linux: ${{ steps.check.outputs.linux }}
      android: ${{ steps.check.outputs.android }}
    steps:
      - name: Check commit message
        id: check
        env:
          MSG: ${{ github.event.head_commit.message || '' }}
        run: |
          W='false'; L='false'; A='false'
          case "$MSG" in
            *linux*)  L='true' ;;
            *mobile*) A='true' ;;
            *all*)    W='true'; L='true'; A='true' ;;
            *)        W='true' ;;  # default / manual dispatch → Windows only
          esac
          echo "windows=$W" >> $GITHUB_OUTPUT
          echo "linux=$L" >> $GITHUB_OUTPUT
          echo "android=$A" >> $GITHUB_OUTPUT
          echo "Platforms → windows:$W linux:$L android:$A"

  # ── Windows ──
  build-windows:
    needs: [test, determine]
    if: needs.determine.outputs.windows == 'true'
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $env:GITHUB_OUTPUT

      - name: Get nightly version
        id: ver
        env:
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          $date = Get-Date -Format "MMdd"
          $nv = "nightly-$date-$env:SHA"
          echo "version=$nv" >> $env:GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go bridge (.dll)
        run: |
          Push-Location go_bridge
          go mod tidy
          $env:CGO_ENABLED = "1"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CC = "gcc"
          go build -buildmode=c-shared -ldflags="-s -w" -o "$env:GITHUB_WORKSPACE\windows\runner\libcroc_bridge.dll" .
          Pop-Location

      - name: Verify .dll
        run: |
          if (Test-Path windows\runner\libcroc_bridge.dll) {
            Get-Item windows\runner\libcroc_bridge.dll | Select-Object Length, FullName
          } else {
            Write-Error "libcroc_bridge.dll not found!"
          }

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Bundle bridge .dll into build output
        run: |
          $outDir = "build\windows\x64\runner\Release"
          Copy-Item "windows\runner\libcroc_bridge.dll" "$outDir\libcroc_bridge.dll" -Force

      - name: Package zip
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath FlCroc-${{ steps.ver.outputs.version }}-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-${{ steps.ver.outputs.version }}-windows-amd64
          path: FlCroc-${{ steps.ver.outputs.version }}-windows-amd64.zip

  # ── Linux ──
  build-linux:
    needs: [test, determine]
    if: needs.determine.outputs.linux == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get nightly version
        id: ver
        env:
          SHA: ${{ steps.sha.outputs.sha }}
        run: echo "version=nightly-$(date +%m%d)-$SHA" >> $GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Linux deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Build Go bridge (.so)
        run: |
          cd go_bridge
          go mod tidy
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -buildmode=c-shared -ldflags="-s -w" -o ../linux/flutter/ephemeral/libcroc_bridge.so .
          cd ..

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Bundle bridge .so into build output
        run: |
          mkdir -p build/linux/x64/release/bundle/lib
          cp linux/flutter/ephemeral/libcroc_bridge.so build/linux/x64/release/bundle/lib/

      - name: Package tar
        run: tar -czf FlCroc-${{ steps.ver.outputs.version }}-linux-amd64.tar.gz -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-${{ steps.ver.outputs.version }}-linux-amd64
          path: FlCroc-${{ steps.ver.outputs.version }}-linux-amd64.tar.gz

  # ── Android ──
  build-android:
    needs: [test, determine]
    if: needs.determine.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get nightly version
        id: ver
        env:
          SHA: ${{ steps.sha.outputs.sha }}
        run: echo "version=nightly-$(date +%m%d)-$SHA" >> $GITHUB_OUTPUT

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Android
        run: flutter build apk --release --target-platform android-arm64

      - name: Rename artifact
        run: mv build/app/outputs/flutter-apk/app-release.apk FlCroc-${{ steps.ver.outputs.version }}-android-arm64.apk

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-${{ steps.ver.outputs.version }}-android-arm64
          path: FlCroc-${{ steps.ver.outputs.version }}-android-arm64.apk

  # ── Nightly release ──
  nightly:
    needs: [build-windows, build-linux, build-android]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get nightly version
        id: ver
        env:
          SHA: ${{ steps.sha.outputs.sha }}
        run: echo "version=nightly-$(date +%m%d)-$SHA" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f -ls

      - name: Delete existing nightly release
        run: |
          if gh release view "nightly" &>/dev/null; then
            echo "Deleting existing nightly release"
            gh release delete "nightly" --yes --cleanup-tag
          else
            echo "No existing nightly release"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly ${{ steps.ver.outputs.version }}"
          body: |
            ## 🌙 Nightly Build

            **Commit**: `${{ steps.sha.outputs.sha }}`
            **Version**: `${{ steps.ver.outputs.version }}`

            > ⚠️ This is an automated dev-branch build. May be unstable.

            ### Download
            | Platform | File |
            |----------|------|
            | 🪟 Windows | `FlCroc-${{ steps.ver.outputs.version }}-windows-amd64.zip` |
          files: |
            artifacts/FlCroc-*-windows-amd64.zip
          draft: false
          prerelease: true
          make_latest: false
