name: Build Windows (dev)

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Run tests
        run: flutter test

  build-windows:
    needs: test
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go bridge (.dll)
        run: |
          Push-Location go_bridge
          go mod tidy
          $env:CGO_ENABLED = "1"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CC = "gcc"
          go build -buildmode=c-shared -ldflags="-s -w" -o "$env:GITHUB_WORKSPACE\windows\runner\libcroc_bridge.dll" .
          Pop-Location

      - name: Verify .dll
        run: |
          if (Test-Path windows\runner\libcroc_bridge.dll) {
            Get-Item windows\runner\libcroc_bridge.dll | Select-Object Length, FullName
          } else {
            Write-Error "libcroc_bridge.dll not found!"
          }

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Bundle bridge .dll into build output
        run: |
          $outDir = "build\windows\x64\runner\Release"
          Copy-Item "windows\runner\libcroc_bridge.dll" "$outDir\libcroc_bridge.dll" -Force
          Write-Host "Bundled bridge .dll into $outDir"

      - name: Package zip
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath FlCroc-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: FlCroc-windows-amd64-dev
          path: FlCroc-windows-amd64.zip
