name: fl_croc
description: "A Flutter GUI for croc - easily and securely transfer files between computers"
publish_to: 'none'

version: 1.2.2+74

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  freezed_annotation: ^2.4.4
  json_annotation: '>=4.9.0 <5.0.0'
  intl: '>=0.20.2 <1.0.0'
  path_provider: ^2.1.5
  path: ^1.9.1
  package_info_plus: '>=8.3.0 <11.0.0'
  url_launcher: ^6.3.1
  file_picker: ^8.1.7
  qr_flutter: ^4.1.0
  shared_preferences: ^2.3.5
  collection: ^1.19.1
  ffi: ^2.1.3
  window_manager: '>=0.4.3 <0.6.0'
  connectivity_plus: '>=6.1.4 <8.0.0'
  archive: '>=3.6.1 <5.0.0'
  drift: '>=2.25.1 <3.0.0'
  drift_flutter: '>=0.2.4 <1.0.0'
  sqlite3_flutter_libs: '>=0.5.30 <1.0.0'
  super_sliver_list: ^0.4.1
  defer_pointer: ^0.0.2
  downloadsfolder: ^1.2.0
  open_filex: ^4.7.0
  fluttertoast: ^9.1.0
  share_receiver: ^1.0.2
  desktop_drop: ^0.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: '>=2.4.14 <3.0.0'
  freezed: ^2.5.8
  json_serializable: '>=6.9.4 <7.0.0'
  drift_dev: '>=2.25.1 <3.0.0'
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  image_path: assets/images/icon.png
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true
  linux:
    generate: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/bundles/
